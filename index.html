<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nederlands Oefenen — Delftse Methode L1–26</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#58CC02;--green-dark:#46A302;--blue:#1CB0F6;--blue-dark:#0E98D8;
    --red:#FF4B4B;--yellow:#FFC800;--yellow-light:#FFF9D8;--purple:#CE82FF;--orange:#FF9600;
    --bg:#131F24;--card:#1F2E35;--card2:#243640;--border:#37464F;
    --text:#F1F7FB;--text-muted:#8FA3AD;--radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;}
  .header{width:100%;max-width:720px;display:flex;align-items:center;justify-content:space-between;padding:16px 18px 8px;gap:14px;}
  .close-btn{background:none;border:none;font-size:24px;cursor:pointer;color:var(--text-muted);padding:4px;border-radius:8px;line-height:1;transition:color .15s;}
  .close-btn:hover{color:var(--text);}
  .progress-bar-wrap{flex:1;height:14px;background:var(--border);border-radius:99px;overflow:hidden;}
  .progress-bar-fill{height:100%;background:var(--green);border-radius:99px;transition:width .4s cubic-bezier(.34,1.4,.64,1);}
  .header-stat{font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;white-space:nowrap;display:flex;align-items:center;gap:5px;color:var(--orange);}
  .main{width:100%;max-width:720px;padding:16px 18px 150px;flex:1;}
  .screen{display:none;animation:fadeIn .25s ease;}
  .screen.active{display:block;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .home-hero{text-align:center;margin-bottom:22px;}
  .flag{font-size:40px;margin-bottom:4px;}
  .home-hero h1{font-family:'Nunito',sans-serif;font-weight:900;font-size:25px;margin-bottom:4px;}
  .home-hero p{color:var(--text-muted);font-size:14px;line-height:1.5;}
  .action-cards{display:flex;flex-direction:column;gap:12px;margin-bottom:26px;}
  .action-card{border:2px solid var(--border);border-bottom-width:4px;border-radius:var(--radius);padding:16px 18px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:all .12s;text-align:left;background:var(--card);width:100%;color:var(--text);font-family:inherit;}
  .action-card:active{transform:translateY(2px);border-bottom-width:2px;}
  .action-card .ac-icon{font-size:28px;width:50px;height:50px;display:flex;align-items:center;justify-content:center;border-radius:14px;flex-shrink:0;}
  .action-card .ac-body{flex:1;}
  .action-card .ac-title{font-family:'Nunito',sans-serif;font-weight:800;font-size:17px;margin-bottom:2px;}
  .action-card .ac-sub{font-size:13px;color:var(--text-muted);line-height:1.4;}
  .action-card .ac-badge{font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;padding:4px 12px;border-radius:99px;flex-shrink:0;}
  .ac-review{border-color:var(--orange);} .ac-review .ac-icon{background:rgba(255,150,0,.15);} .ac-review .ac-badge{background:var(--orange);color:#2b1900;}
  .ac-review.empty{border-color:var(--border);opacity:.55;} .ac-review.empty:active{transform:none;border-bottom-width:4px;}
  .ac-train{border-color:var(--purple);} .ac-train .ac-icon{background:rgba(206,130,255,.15);} .ac-train .ac-badge{background:var(--purple);color:#2d1745;}
  .ac-verb{border-color:var(--blue);} .ac-verb .ac-icon{background:rgba(28,176,246,.15);} .ac-verb .ac-badge{background:var(--blue);color:#04344d;}
  .section-label{font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-muted);margin:0 4px 12px;}
  .unit-section{margin-bottom:24px;}
  .unit-label{display:flex;align-items:center;gap:8px;color:white;border-radius:12px;padding:11px 16px;margin-bottom:14px;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;letter-spacing:.4px;text-transform:uppercase;}
  .unit-label.green{background:var(--green-dark);} .unit-label.blue{background:var(--blue-dark);} .unit-label.purple{background:#9d4edd;} .unit-label.orange{background:#d97500;}
  .lesson-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  @media(min-width:520px){.lesson-grid{grid-template-columns:1fr 1fr 1fr;}}
  .lesson-btn{background:var(--card);border:2px solid var(--border);border-bottom-width:4px;border-radius:var(--radius);padding:13px 12px;cursor:pointer;font-family:'Nunito',sans-serif;color:var(--text);transition:all .12s;text-align:center;position:relative;}
  .lesson-btn:active{transform:translateY(2px);border-bottom-width:2px;}
  .lesson-btn .les-num{font-size:20px;font-weight:900;display:block;}
  .lesson-btn .les-topic{font-size:11px;font-weight:700;color:var(--text-muted);margin-top:2px;line-height:1.2;}
  .lesson-btn .les-mastery{margin-top:7px;height:5px;border-radius:99px;background:var(--border);overflow:hidden;}
  .lesson-btn .les-mastery>div{height:100%;background:var(--green);border-radius:99px;transition:width .4s;}
  .lesson-btn.mastered{border-color:var(--green);} .lesson-btn.mastered .les-num{color:var(--green);}
  .lesson-btn .les-read{position:absolute;top:-7px;left:-7px;font-size:13px;background:var(--blue);border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;z-index:2;}
  .lesson-btn .les-rounds{display:block;font-size:11px;font-weight:800;color:var(--green);margin-top:4px;letter-spacing:1px;}
  .lesson-btn .les-check{position:absolute;top:-7px;right:-7px;font-size:14px;background:var(--green);border-radius:50%;width:22px;height:22px;display:none;align-items:center;justify-content:center;color:#04340a;}
  .lesson-btn.mastered .les-check{display:flex;}
  .ex-label{font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--blue);margin-bottom:8px;}
  .ex-type-badge{display:inline-block;background:var(--blue);color:#04344d;font-size:11px;font-weight:800;padding:4px 11px;border-radius:99px;margin-bottom:16px;font-family:'Nunito',sans-serif;letter-spacing:.5px;text-transform:uppercase;}
  .ex-type-badge.review{background:var(--orange);color:#2b1900;} .ex-type-badge.verb{background:var(--blue);color:#04344d;}
  .ex-title{font-family:'Nunito',sans-serif;font-weight:800;font-size:22px;line-height:1.35;margin-bottom:22px;color:var(--text);}
  .options{display:flex;flex-direction:column;gap:10px;}
  .option-btn{background:var(--card);border:2px solid var(--border);border-bottom-width:4px;border-radius:var(--radius);padding:15px 18px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:17px;font-weight:600;color:var(--text);text-align:left;transition:all .1s;display:flex;align-items:center;gap:13px;width:100%;}
  .option-btn:active:not(:disabled){transform:translateY(2px);border-bottom-width:2px;}
  .option-btn.selected{border-color:var(--blue);background:rgba(28,176,246,.12);color:var(--blue);}
  .option-btn.correct{border-color:var(--green)!important;background:rgba(88,204,2,.15)!important;color:var(--green)!important;}
  .option-btn.wrong{border-color:var(--red)!important;background:rgba(255,75,75,.12)!important;color:var(--red)!important;}
  .option-btn:disabled{cursor:default;}
  .opt-letter{width:28px;height:28px;border-radius:8px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;flex-shrink:0;color:var(--text-muted);}
  .word-bank-sentence{background:var(--card);border:2px solid var(--border);border-radius:var(--radius);min-height:64px;padding:14px 16px;margin-bottom:18px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-family:'Nunito',sans-serif;}
  .word-placed{background:var(--blue);color:#04344d;border-radius:10px;padding:6px 13px;font-size:16px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;border:2px solid var(--blue-dark);}
  .word-placed:active{opacity:.8;}
  .word-bank{display:flex;flex-wrap:wrap;gap:8px;}
  .word-chip{background:var(--card);border:2px solid var(--border);border-bottom-width:4px;border-radius:12px;padding:9px 16px;font-family:'Nunito',sans-serif;font-weight:700;font-size:16px;cursor:pointer;transition:all .1s;color:var(--text);}
  .word-chip:active:not(.used){transform:translateY(2px);border-bottom-width:2px;}
  .word-chip.used{opacity:.25;pointer-events:none;}
  .fill-sentence{font-family:'Nunito',sans-serif;font-size:21px;font-weight:700;line-height:1.7;margin-bottom:8px;color:var(--text);}
  .blank-input{border:none;border-bottom:3px solid var(--blue);background:var(--card);font-family:'Nunito',sans-serif;font-size:20px;font-weight:800;color:var(--blue);width:160px;text-align:center;outline:none;padding:4px 8px;margin:0 4px;border-radius:8px 8px 0 0;}
  .blank-input.correct{border-color:var(--green);color:var(--green);}
  .blank-input.wrong{border-color:var(--red);color:var(--red);}
  .fill-hint{font-size:13px;color:var(--text-muted);margin-top:10px;font-style:italic;}
  .match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .match-col{display:flex;flex-direction:column;gap:10px;}
  .match-chip{background:var(--card);border:2px solid var(--border);border-bottom-width:4px;border-radius:12px;padding:14px 12px;text-align:center;font-family:'Nunito',sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:all .1s;color:var(--text);min-height:52px;display:flex;align-items:center;justify-content:center;}
  .match-chip:active:not(.matched-correct){transform:translateY(2px);border-bottom-width:2px;}
  .match-chip.selected{border-color:var(--blue);background:rgba(28,176,246,.12);color:var(--blue);}
  .match-chip.matched-correct{border-color:var(--green)!important;background:rgba(88,204,2,.12)!important;color:var(--green)!important;opacity:.5;pointer-events:none;}
  .match-chip.matched-wrong{border-color:var(--red)!important;background:rgba(255,75,75,.12)!important;animation:shake .3s;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .grammar-tip{background:var(--yellow-light);border-radius:var(--radius);padding:16px 18px;margin-bottom:20px;color:#3a2e00;}
  .grammar-tip strong{font-family:'Nunito',sans-serif;font-weight:900;font-size:15px;display:block;margin-bottom:8px;color:#3a2e00;}
  .grammar-tip *{color:#3a2e00;}
  .grammar-tip table{width:100%;border-collapse:collapse;}
  .grammar-tip td,.grammar-tip th{padding:6px 9px;font-size:13px;border:1px solid rgba(0,0,0,.12);text-align:left;color:#3a2e00;}
  .grammar-tip th{background:rgba(0,0,0,.06);font-weight:800;}
  .grammar-tip td:first-child{font-weight:700;color:#3a2e00;}
  .feedback{position:fixed;bottom:0;left:0;right:0;padding:0;display:none;z-index:100;}
  .feedback.active{display:block;}
  .feedback-inner{max-width:720px;margin:0 auto;padding:18px;border-radius:20px 20px 0 0;}
  .feedback-inner.correct{background:#16312b;border-top:2px solid var(--green);}
  .feedback-inner.wrong{background:#3a1f24;border-top:2px solid var(--red);}
  .feedback-inner.close{background:#3a3420;border-top:2px solid var(--yellow);}
  .feedback-inner.close .feedback-title{color:var(--yellow);}
  .feedback-head{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
  .feedback-icon{font-size:26px;}
  .feedback-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:18px;}
  .feedback-inner.correct .feedback-title{color:var(--green);} .feedback-inner.wrong .feedback-title{color:var(--red);}
  .feedback-answer{font-family:'Nunito',sans-serif;font-weight:700;font-size:15px;margin-bottom:6px;color:var(--text);}
  .feedback-note{font-size:14px;color:var(--text-muted);line-height:1.5;margin-bottom:14px;}
  .continue-btn,.check-btn,.btn-primary{display:block;width:100%;max-width:720px;margin:0 auto;background:var(--green);border:none;border-bottom:4px solid var(--green-dark);border-radius:14px;padding:16px;font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;color:#fff;cursor:pointer;transition:all .1s;letter-spacing:.5px;}
  .continue-btn:active,.check-btn:active,.btn-primary:active{transform:translateY(2px);border-bottom-width:2px;}
  .continue-btn.wrong-btn{background:var(--red);border-bottom-color:#CC3B3B;}
  .check-area{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);padding:14px 18px;display:none;z-index:50;}
  .check-area.visible{display:block;}
  .check-btn:disabled{background:var(--border);border-bottom-color:#2a363c;color:var(--text-muted);cursor:default;}
  .check-btn.flip{background:var(--blue);border-bottom-color:var(--blue-dark);color:#04344d;}
  .skip-btn{background:none;border:none;color:var(--text-muted);font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;cursor:pointer;display:block;margin:10px auto 0;text-decoration:underline;}
  .results{text-align:center;padding:30px 16px;}
  .result-icon{font-size:64px;margin-bottom:14px;animation:bounceIn .5s;}
  @keyframes bounceIn{0%{transform:scale(0)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
  .results h2{font-family:'Nunito',sans-serif;font-weight:900;font-size:28px;margin-bottom:8px;}
  .results p{color:var(--text-muted);font-size:15px;margin-bottom:26px;line-height:1.5;}
  .stats-row{display:flex;gap:12px;justify-content:center;margin-bottom:26px;flex-wrap:wrap;}
  .stat-card{background:var(--card);border:2px solid var(--border);border-radius:var(--radius);padding:14px 22px;min-width:100px;}
  .stat-card .num{font-family:'Nunito',sans-serif;font-weight:900;font-size:26px;}
  .stat-card .num.green{color:var(--green);} .stat-card .num.red{color:var(--red);} .stat-card .num.orange{color:var(--orange);}
  .stat-card .label{font-size:12px;color:var(--text-muted);font-weight:600;margin-top:2px;}
  .btn-row{display:flex;flex-direction:column;gap:10px;max-width:360px;margin:0 auto;}
  .btn-secondary{background:var(--card);border:2px solid var(--border);border-bottom-width:4px;border-radius:14px;padding:14px;font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;color:var(--text);cursor:pointer;transition:all .1s;}
  .btn-secondary:active{transform:translateY(2px);border-bottom-width:2px;}
  .review-list{text-align:left;max-width:480px;margin:0 auto 26px;}
  .review-item{background:var(--card);border:1px solid var(--border);border-left:4px solid var(--red);border-radius:12px;padding:12px 14px;margin-bottom:8px;}
  .review-item .ri-q{font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;margin-bottom:4px;}
  .review-item .ri-a{font-size:13px;color:var(--green);font-weight:700;}
  /* selector (config) screen */
  .config-intro{color:var(--text-muted);font-size:14px;line-height:1.5;margin-bottom:18px;}
  .chip-grid{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:18px;}
  .sel-chip{background:var(--card);border:2px solid var(--border);border-bottom-width:4px;border-radius:12px;padding:11px 14px;font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;color:var(--text);cursor:pointer;transition:all .1s;}
  .sel-chip:active{transform:translateY(2px);border-bottom-width:2px;}
  .sel-chip.on{border-color:var(--purple);background:rgba(206,130,255,.16);color:#e9c6ff;}
  .sel-chip.on.verbtense{border-color:var(--blue);background:rgba(28,176,246,.16);color:#bfe9ff;}
  .config-row{display:flex;gap:10px;margin-bottom:14px;}
  .config-row .btn-secondary{flex:1;padding:11px;font-size:13px;}
  .tense-chip{width:100%;text-align:left;display:flex;flex-direction:column;gap:2px;}
  .tense-chip .tc-sub{font-size:12px;font-weight:600;color:var(--text-muted);}
  .tense-chip.on .tc-sub{color:inherit;opacity:.8;}
  .verb-card{background:var(--card);border:2px solid var(--border);border-radius:20px;padding:30px 20px;text-align:center;margin-bottom:18px;}
  .verb-card .vc-inf{font-family:'Nunito',sans-serif;font-weight:900;font-size:30px;margin-bottom:4px;}
  .verb-card .vc-en{font-size:15px;color:var(--text-muted);margin-bottom:8px;}
  .verb-card .vc-tag{display:inline-block;font-size:11px;font-weight:800;padding:3px 10px;border-radius:99px;font-family:'Nunito',sans-serif;text-transform:uppercase;letter-spacing:.5px;}
  .verb-card .vc-tag.irr{background:rgba(255,150,0,.2);color:var(--orange);}
  .verb-card .vc-tag.reg{background:rgba(88,204,2,.2);color:var(--green);}
  @media(max-width:400px){.ex-title{font-size:20px}.match-chip{font-size:13px;padding:12px 8px}}
  .rw{cursor:pointer;border-bottom:2px dotted var(--blue);color:var(--blue);transition:background .1s;border-radius:3px;padding:0 1px;}
  .rw-audio{cursor:pointer;color:var(--text);border-radius:3px;padding:0 1px;}
  .rw-audio:active{background:rgba(255,255,255,.1);}
  .rw:active{background:rgba(28,176,246,.2);}
  .streak-banner{border-radius:var(--radius);padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:14px;background:var(--card);border:2px solid var(--border);}
  .streak-banner.active{border-color:#FF9600;background:rgba(255,150,0,.1);}
  .streak-banner.frozen{border-color:#1CB0F6;background:rgba(28,176,246,.1);}
  .streak-banner.none{border-color:var(--border);background:var(--card);}
  .streak-fire{font-size:36px;line-height:1;}
  .streak-body{flex:1;}
  .streak-count{font-family:'Nunito',sans-serif;font-weight:900;font-size:24px;line-height:1.1;}
  .streak-count.active{color:#FF9600;}
  .streak-count.frozen{color:#1CB0F6;}
  .streak-count.none{color:var(--text-muted);}
  .streak-label{font-size:13px;color:var(--text-muted);margin-top:2px;line-height:1.4;}
  .streak-done{font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;padding:5px 12px;border-radius:99px;background:rgba(88,204,2,.2);color:var(--green);border:1px solid var(--green);}
</style>
</head>
<body>
<div class="header" id="mainHeader">
  <button class="close-btn" onclick="goHome()">&times;</button>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
  <div class="header-stat" id="headerStat"></div>
</div>
<div class="main">
  <div class="screen active" id="homeScreen">
    <div class="home-hero"><div class="flag">&#127475;&#127473;</div><h1>Nederlands Oefenen</h1><p>Delftse Methode &bull; Lessen 1&ndash;26<br>Herhaling is de sleutel</p></div>
    <div id="streakBanner"></div>
    <button class="action-card" style="border-color:#9d4edd;" onclick="openStats()">
      <div class="ac-icon" style="background:rgba(157,78,221,.15);">&#128202;</div>
      <div class="ac-body">
        <div class="ac-title">Mijn voortgang</div>
        <div class="ac-sub" id="statsCardSub">Bekijk je oefentijd per dag</div>
      </div>
      <div class="ac-badge" style="background:#9d4edd;color:#fff;" id="statsCardBadge"></div>
    </button>
    <div class="action-cards">
      <button class="action-card ac-review" id="reviewCard" onclick="startReview()"><div class="ac-icon">&#128260;</div><div class="ac-body"><div class="ac-title">Foutenrevisie</div><div class="ac-sub" id="reviewSub">Oefen de woorden die je fout had</div></div><div class="ac-badge" id="reviewBadge">0</div></button>
      <button class="action-card ac-verb" onclick="openVerbConfig()"><div class="ac-icon">&#9889;</div><div class="ac-body"><div class="ac-title">Werkwoorden trainen</div><div class="ac-sub">Betekenis &amp; tijden &bull; kies welke tijden</div></div><div class="ac-badge">&#9889;</div></button>
      <button class="action-card ac-train" onclick="openTrainConfig()"><div class="ac-icon">&#9851;</div><div class="ac-body"><div class="ac-title">Oneindig trainen</div><div class="ac-sub">Kies welke lessen je mengt &bull; blijft herhalen</div></div><div class="ac-badge">&#8734;</div></button>
    </div>
    <div class="section-label">Kies een les</div>
    <div id="unitsContainer"></div>
  </div>

  <div class="screen" id="configScreen">
    <div class="ex-label" id="configLabel"></div>
    <div class="ex-title" id="configTitle"></div>
    <div class="config-intro" id="configIntro"></div>
    <div class="config-row">
      <button class="btn-secondary" onclick="configSelectAll()">Alles selecteren</button>
      <button class="btn-secondary" onclick="configSelectNone()">Alles wissen</button>
    </div>
    <div class="chip-grid" id="configChips"></div>
  </div>

  <div class="screen" id="exerciseScreen">
    <div class="ex-label" id="exLabel"></div>
    <div id="exTypeBadge" class="ex-type-badge"></div>
    <div class="ex-title" id="exTitle"></div>
    <div id="exContent"></div>
  </div>

  <div class="screen" id="readScreen">
    <div class="ex-label" id="readLabel">&#128214; Tekst lezen</div>
    <div class="ex-title" id="readTitle"></div>

const LESSON_TEXTS = {
  1: { title:"Hoe heet je?", lines:["Hallo, ik ben Inge. Mijn naam is Inge van Dijk. Ik ben de docent. Wie ben jij? Hoe heet je? Wat is je naam?","Ik heet Paula. Mijn naam is Paula.","Hallo Paula.","Dag mevrouw.","Wat zegt u? Waar kom je vandaan?","Ik kom uit Frankrijk.","En u meneer? Hoe heet u? Wat is uw naam?","Mijn naam is Alex Wang. Waar komt u vandaan? Uit welk land komt u?","Ik kom uit China.","Waar woont u? In welke stad?","Ik woon nu in Den Haag.","In welke straat?","In de Marktstraat, in het centrum. Op nummer 35.","Wat is uw telefoonnummer?","Mijn telefoonnummer is 06-12345678.","Paula, woon jij ook in Den Haag?","Nee, ik woon in Rotterdam, dichtbij het centrum."], glossary:LESSON_GLOSSARY },
  2: { title:"Uit welk land kom je?", lines:["Hallo Amber. Uit welk land kom je?","Ik kom uit Engeland. Ik heb de Engelse en de Nederlandse nationaliteit.","Hoe lang woon je in Nederland?","Ik woon hier nu zes jaar.","Wat is je leeftijd? Wanneer ben je geboren?","Ik ben geboren op drieëntwintig (23) maart 1987.","Woon je alleen, bij vrienden of bij familie?","Ik ben getrouwd met een Nederlander. Zijn naam is Daan Bakker. We wonen in Delft.","Hebben jullie kinderen?","Ja, we hebben twee kinderen. We hebben een jongen van drie jaar en een meisje van vijf maanden. Ze heten Sam en Iris Bakker.","Wonen jullie in het centrum?","Nee, we wonen in een huis buiten het centrum."], glossary:LESSON_GLOSSARY },
  3: { title:"Welke dag is het vandaag?", lines:["Welke dag is het vandaag? Het is vandaag dinsdag. Gisteren was het maandag. En morgen is het woensdag.","Na woensdag volgen donderdag en vrijdag. De laatste twee dagen van de week zijn zaterdag en zondag. Dan is het weekend.","Wanneer werken de meeste mensen? Van maandag tot en met vrijdag. De meeste mensen zijn in het weekend vrij. We werken dan meestal niet.","We gaan dan naar familie. Of we gaan naar buiten met de kinderen, of met vrienden. We hebben ook tijd om boodschappen te doen.","Op welke dagen zijn de winkels open? De meeste winkels zijn op maandag tot en met zaterdag open en veel winkels ook op zondag.","Zijn scholen in het weekend dicht? Ja, alle scholen zijn dicht in het weekend."], glossary:LESSON_GLOSSARY },
  4: { title:"De Nederlandse les", lines:["Welke talen spreek je, Paula?","Engels, Frans en een beetje Nederlands. Ik spreek Nederlands in de les en in de winkel. Maar op mijn werk spreken we Engels.","Maar waarom leer je dan Nederlands? Waarom doe je deze cursus?","Nederlands is belangrijk. Ik wil hier studeren en werken.","Is Nederlands een moeilijke taal?","Nee, Nederlands is niet moeilijk. Het is een makkelijke taal. En de docent spreekt langzaam en duidelijk. Alle talen zijn makkelijk. Mijn dochter is zes jaar en spreekt al goed Nederlands.","En hoe leer jij Nederlands?","Ik luister goed naar de teksten van het Groene Boek.","Wanneer heb je les? Hoeveel keer per week?","Ik heb vier keer per week les: elke dag behalve vrijdag. Dat is veel!","Wat is je rooster?","Ik zit in groep A. Groep A begint \\'s ochtends om negen uur, en \\'s middags om één uur. Elke les duurt één uur. \\'s Ochtends hebben we les van negen tot tien uur, en \\'s middags van één tot twee uur. Wij hebben les in B25.","En wat doen jullie na de lessen en \\'s avonds?","Leren, leren, leren! We leren dan de teksten voor de volgende dag. We hebben twee teksten per dag, soms drie.","En in het weekend?","In het weekend hebben we geen les. We leren dan voor maandag. Iedereen heeft dan vrij, behalve wij!"], glossary:LESSON_GLOSSARY },
  5: { title:"Mijn dag", lines:["Nick, hoe laat ben je meestal wakker?","Ik ben altijd om zes uur wakker. Dan eet ik brood en drink ik thee.","Waarom ben je zo vroeg wakker? Moet je zo vroeg van huis?","Ik moet om half negen (8.30) op mijn werk zijn. Het is een lange reis. Daarom ga ik niet met de fiets.","Hoe reis je?","Ik ga met de bus van kwart voor zeven (6.45) naar het station. De bus komt om half acht (7.30) aan bij het station. Dat is de officiële tijd. Maar de bus is nu eenmaal niet altijd op tijd. Gisteren was hij te laat. Toen heb ik de trein gemist. Maar meestal mis ik hem niet, want hij vertrekt om kwart voor acht. Ik heb dus een kwartier op het station: vijftien minuten. Soms vertrekt de trein ook te laat. Maar meestal komt hij op tijd.","Wat doe je in die tijd op het station?","Ik lees bijvoorbeeld de krant of leer voor mijn lessen Nederlands.","Hoe laat kom je op je werk aan?","Ik ben om vijf voor half negen (8.25) op mijn werk. Ik eet meestal om één uur, en ik drink thee om vier uur.","Tot hoe laat werk je? Hoe laat ga je weer naar huis?","Dat verschilt van dag tot dag. Meestal werk ik tot half zes (17.30). Maar gisteren werkte ik bijvoorbeeld tot kwart over vier (16.15). Meestal kom ik om half acht \\'s avonds thuis. We eten om acht uur. Soms kijk ik een half uur televisie. Daarna doe ik mijn huiswerk voor mijn Nederlandse les. Maar om half tien stop ik. De dag is dan al bijna afgelopen. Dus ik heb het druk. Jij ook?"], glossary:LESSON_GLOSSARY },
  6: { title:"Boodschappen doen", lines:["Hallo Amber. Waar doe jij je boodschappen?","Meestal doe ik in het weekend boodschappen in een supermarkt. Ik koop alles voor de hele week. Voor een week heb ik veel nodig dus ik maak een lijstje. Daar staat alles op: melk, brood, aardappelen, fruit... Soms weet ik niet waar iets staat in de supermarkt.","Waar staat de melk? O, daar zie ik iemand die kan helpen. Meneer mag ik u wat vragen? Ik zie de melk nergens. Waar vind ik die?","Daar bij het brood links en dan rechts. Ik loop wel even met u mee.","Ik geloof dat ik alles heb. O nee, ik heb geen koffie meer. O kijk: twee halen, één betalen. Dat doe ik. Dan heb ik één pak koffie gratis. Als ik alles heb, ga ik naar de kassa om te betalen. De mevrouw aan de kassa zegt: \"Goedemiddag\", en \"Tot ziens, fijn weekend!\" Dat is het hele gesprek.","Soms ga ik op zaterdag naar de markt om groente en fruit te kopen. Wat is het verschil tussen de markt en de supermarkt?","Op de markt zijn de meeste producten goedkoop. Goedkoper dan in de supermarkt. Dat is een belangrijk verschil."], glossary:LESSON_GLOSSARY },
  7: { title:"Stap voor stap leren", lines:["Hoe werkt de Delftse methode? Leer je de teksten uit je hoofd?","Nee, je moet de tekst verstaan en begrijpen zonder hulp. Dat kost tijd. Daarom leer je de tekst in stappen. Dat kost meestal twee of drie uur per tekst. Hier zijn de vijf stappen in de online cursus.","Ga in het menu naar \\'Les\\'. Je begint met stap één. Je kijkt en luistert goed naar elke zin. Aan het eind van de zin is een pauze. De woorden zoek je op. Je weet dan wat ze betekenen, en je begrijpt de zin. Spreken ze te snel? Versta je niet alles? Luister een paar keer naar elke zin. Je zegt ook elke zin na, en je luistert naar je uitspraak. Zo leer je de uitspraak.","Dus ik doe drie dingen: luisteren, lezen en nazeggen?","Ja, en dat doe je zo een paar keer. Bij stap twee doe je dat ook. Maar nu heb je geen pauze na de zin. En bij stap drie en vier heb je ook geen hulp meer van de tekst. Je kunt de woorden niet meer opzoeken.","Ik begrijp het. Ik leer de tekst eerst met hulp, daarna zonder hulp. Zo leer ik de woorden, zo leer ik luisteren. En zo oefen ik de uitspraak. Bij stap vijf krijg je antwoord op de vraag: ken ik de tekst goed? In het menu \\'Toets\\' vind je een luistertoets. Je resultaat moet 80% of meer zijn. In het boek staat ook een tekst met gaten voor de controle. Die lees je hardop. Schrijf niet in je boek. Je moet de teksten later herhalen.","Wat doe ik met de oefening?","Die doe je alleen als je de tekst goed kent. En in het boek heb je ook nog vragen. Die zijn om te leren praten. En wat doen we in de les? Praten, veel praten. Zo werkt de Delftse Methode."], glossary:LESSON_GLOSSARY },
  8: { title:"Eet smakelijk!", lines:["Is een maaltijd in China anders dan in Nederland?","Zeker. Maar wat is een Nederlandse maaltijd? Vroeger was het antwoord op deze vraag makkelijk omdat iedereen ongeveer hetzelfde at. Nu niet meer. We eten nu producten uit bijna de hele wereld. Maar het aantal maaltijden is hetzelfde. We eten drie keer per dag.","De eerste maaltijd is het ontbijt. Veel Nederlanders eten brood met kaas. Ze drinken koffie, thee of melk. Mijn vriend neemt alleen een kop zwarte koffie. Is dat gezond? Krijgt hij zo genoeg energie? Ik denk het niet.","De tweede maaltijd is \\'s middags, om ongeveer één uur. Ook dan eten de meeste Nederlanders weer brood met kaas of vlees. Vaak drinken ze daarbij melk. Soms eten ze ook iets warms, bijvoorbeeld soep. Ook zijn er mensen die eten kopen. Dat is makkelijk. Als je werkt, heb je vaak weinig tijd om te eten.","De derde en belangrijkste maaltijd voor ons is het avondeten, om ongeveer zes uur. Dat is meestal een warme maaltijd. Vroeger aten we vooral groente en aardappelen met vlees, vis of kip. Maar nu eten we ook pasta, rijst, en veel andere producten. Meestal drinken we daar water bij.","Dus jullie hebben maar één warme maaltijd? Dat verbaast me. En zo vroeg! Bij ons eten we veel later.","Ja, misschien is dat typisch Nederlands. Maar vertel eens, wat eten jullie? En wat vind jij lekker?"], glossary:LESSON_GLOSSARY },
  9: { title:"Hoe kom je naar de les?", lines:["Katja, vertel eens, hoe ben jij naar de les gekomen?","Met de bus. Ik ben bij het station uitgestapt. Van het station ben ik lopend naar school gegaan.","Hoe lang duurde je reis? Hoe lang heb je erover gedaan?","Ik heb er een half uur over gedaan. Soms kom ik met de fiets. Dat is sneller dan met de bus! Bovendien is het meestal druk in de bus. Dan kan ik niet zitten. De bus heeft ook vaak vertraging. Hij is dan te laat. En ik kom dan ook niet op tijd! Dat vind ik vervelend.","Waarom kom je niet elke dag met de fiets?","Nou, omdat het hier vaak regent. En als je in de regen fietst, word je nat. Dat is een nadeel. Dan neem ik liever de bus.","En wie komt er met de auto? Heeft er iemand een auto? Jij Lisa?","Ja, ik meneer. Ik heb een auto. Kijk, daar staat hij: die kleine witte daar. Ik kan niet zonder. Er komt geen bus bij mij in de buurt. Met de auto kan ik overal naartoe. En het is sneller. Ik hoef nooit te wachten.","Behalve als je in de file staat. \\'s Ochtends is er altijd file.","Ja, dat is waar. Maar in de auto heb je meer ruimte. Er zitten geen andere mensen in. Je bent alleen. Je kunt naar de radio luisteren.","Ja, dat is wel een voordeel, maar de bus is misschien goedkoper!","(De les is al een kwartier bezig. Fred komt binnen.)","Goedemorgen, meneer!","Goedemorgen?! Goedemiddag! Waarom ben je zo laat? Je woont niet ver weg. Het is maar vijf minuten met de fiets. Dat is dus dichtbij.","Ja, met de fiets ben ik hier binnen vijf minuten. Maar vanochtend was mijn fiets kapot. Daarom moest ik lopen. Dan doe ik er langer over.","Maar gisteren was je ook te laat. Was je fiets gisteren ook kapot?","Nee, gisteren was de brug open. Dat kost ook veel tijd. Daarom was ik te laat. Sommige mensen hebben nooit geluk!"], glossary:LESSON_GLOSSARY },
  10: { title:"De vier seizoenen", lines:["Welke dag is het vandaag? Hoe laat gaan de winkels dicht? Hoe lang duurt de cursus? Wanneer ga je met vakantie? Hoeveel keer per week heeft u les?","Die vragen zijn belangrijk! We willen weten wanneer iets gebeurt, of hoe lang iets duurt. Daarom verdelen we de tijd in jaren, maanden, weken, dagen, uren, minuten en seconden. Een maand heeft ongeveer vier weken en een week zeven dagen.","In Nederland hebben we vier seizoenen. Het weer verschilt per seizoen. In de zomer is het warm. Tenminste, dat zeggen de Nederlanders. Tussen de 21 en de 25 graden vinden ze warm. Vaak schijnt de zon, maar het regent ook erg vaak. In de maanden juli en augustus gaan veel mensen met vakantie. Naar een land dat niet zo nat is, met meer zon en weinig regen!","In september begint de herfst. In oktober en november wordt het koud. De dagen zijn al korter. Het wordt vroeg donker. Het waait. Gele bladeren vallen van de bomen.","In december begint de winter. Het wordt nog kouder.","In de lente komen er weer bladeren aan de bomen. We zien overal bloemen. Het wordt warmer, de temperatuur stijgt, de dagen zijn steeds langer. Een mooi seizoen!","Wat een heerlijk klimaat heeft Nederland. Je hebt alles: zon, regen, wind. Het weer is nooit hetzelfde, het verandert steeds. Het is não te warm, maar ook niet te koud. Het beste plekje van de wereld!"], glossary:LESSON_GLOSSARY },
  11: { title:"Hoe wonen jullie?", lines:["Hoe wonen jullie eigenlijk? Hebben jullie een eigen huis? Of huren jullie een woning? Of woon je op kamers, dus bij iemand anders in huis? Woon je alleen, met familie, of met een huisgenoot? Katja, vertel eens hoe je woont.","In mijn land woonde ik bij mijn moeder, maar hier woon ik op kamers. Samen met een vriend en twee andere huisgenoten, allemaal mannen. Wij hebben allemaal onze eigen kamer. Maar de badkamer, de wc en de keuken zijn beneden. Die gebruiken we samen.","Hebben jullie veel contact met die huisgenoten?","Ja, het zijn Nederlandse studenten en ze zijn erg aardig. We hebben veel contact met hen. We eten ook af en toe samen.","Heb je veel ruimte? Hoe groot is je kamer?","Mijn kamer is vrij ruim: ongeveer 25 vierkante meter. Ik woon en werk er en ik slaap er ook. Mijn woonkamer is dus ook slaapkamer. De keuken is niet ruim: maar twee bij drie meter. En hij is donker. Er zitten geen ramen in. Toch ben ik tevreden. Ik heb genoeg ruimte om te wonen en te studeren.","Is het een dure kamer? Hoeveel betaal je ervoor, als ik vragen mag? Wat noemt u duur?","Ik betaal 400 euro per maand, inclusief water en internet. Zelf vind ik dat een redelijke huur. Ik ben dus erg tevreden!","Ja, dat vind ik ook redelijk. Hoe ben je aan die kamer gekomen?","Via een vriend van mij. Die woont al lang in Nederland. En jij Lisa, woon jij ook op kamers?","Nee, ik woon nog bij mijn vader, maar mijn vriend en ik gaan binnenkort samenwonen. We willen een flat kopen. We zoeken een flat met twee kamers en een keuken. Het liefst dicht bij het centrum. Dus als jullie iets weten ..."], glossary:LESSON_GLOSSARY },
  12: { title:"Hoe kom ik daar?", lines:["Zeg Alex, heb je zin om volgende week zaterdag te komen eten? Om een uur of zes? Lisa en een paar anderen van de groep komen ook.","Ja, leuk, Sara! Ik kom graag. Waar woon je?","In de Kerkstraat, op nummer 77. Het is niet heel ver. Je kunt het lopen. Zal ik het even uitleggen?","Dat is niet nodig, mijn mobiel wijst me de weg. Trouwens, Lisa woont bij mij om de hoek, we kunnen samen gaan. Met z\\'n tweeën vinden we je huis wel. Zal ik iets meenemen?","Nee hoor, dat hoeft niet.","Alex en Lisa gaan op weg. Ze hebben allebei iets gekocht voor Sara: Alex heeft een boek gekocht en Lisa bloemen. Alex zegt: \\'Ik weet uit mijn hoofd hoe we moeten lopen\\'. Maar na een paar straten vraagt hij: Moeten we hier links- of rechtsaf? Ik ben het vergeten.","Lisa pakt haar mobiel. Waar gaan we naartoe? Van hier naar ...?","Kerkstraat 77. Kijk. We moeten hier linksaf. We lopen rechtdoor. Na 345 meter komen we bij een brede weg. Die weg moeten we oversteken. Dus we gaan eerst verder in dezelfde richting.","Lisa en Alex steken de drukke brede weg over. Even later zijn ze op een plein met veel winkels. Daar moet het ongeveer zijn. Ze zien een kerk, de Kerkstraat is nu dichtbij. Het is over de brug de eerste straat rechts. Kijk daar, aan de linkerkant, in dat hoge gebouw, daar woont Sara. Op de tweede verdieping.","Nemen we de lift?","Nee, kom, het zijn maar vier trappen. Boven gaan ze links de hoek om. Nummer 77 is de laatste deur aan de linkerkant."], glossary:LESSON_GLOSSARY },
  13: { title:"Een leuk weekend", lines:["Hoi Katja, hoe gaat het?","Goed. En met jou?","Ook goed. Heb je een leuk weekend gehad?","Ja zeker, maar het was erg druk. Ik ben op bezoek geweest bij vrienden. Die wonen pas drie maanden in Nederland. Ze wilden graag iets nieuws zien. Dus zondagmiddag zijn we naar het museum Beelden aan Zee gegaan. Dat is een prachtig museum. En er was geen lange rij, dus we waren snel binnen.","Dat klinkt goed. Hebben jullie daar ook gegeten?","Nee, we hebben bij hen thuis een Spaanse maaltijd gekookt. En daarna hebben we een film gekeken. Het was erg gezellig. We hadden een interessant gesprek over de verschillen tussen de Franse en Nederlandse cultuur. Ook hebben we erg gelachen. Ik was wel laat thuis. En jij, Nick? Wat heb jij gedaan?","Ik heb niets bijzonders gedaan. Ik slaap meestal uit op zaterdag. En dan ruim ik mijn kamer op en maak de badkamer schoon. Afgelopen zaterdag heb ik tot elf uur uitgeslapen. Daarna heb ik boodschappen gedaan op de markt, met mijn vriendin. Ik heb ook een paar mails gestuurd en m\\'n ouders gebeld. Die sliepen al. Dom van me! Ik vergeet altijd dat het daar veel later is. Op zondag zijn we naar de kerk gegaan. Dat doen we elke zondag. En natuurlijk heb ik de teksten voor maandag geleerd.","Had jij genoeg tijd om te leren?","Eigenlijk niet. Ik had het erg druk omdat ik op zaterdag moet werken. Ik heb Nederlands gesproken in de pauze. Ik heb een kwartier met een collega gepraat. Die stelde veel vragen. En weet je wat hij zei: \\'Tjonge, wat spreek jij al goed Nederlands!\\'"], glossary:LESSON_GLOSSARY },
  14: { title:"Familie", lines:["Kom jij uit een groot gezin, Sara? Hoeveel broers en zussen heb je?","Ik heb drie broers en twee zussen. Een normaal gezin dus.","Normaal? Dat vind ik groot! Twee of drie kinderen, dat is hier normaal. Vaak is er maar één kind.","Eén kind? Dat meen je niet, Mark! Niemand om mee te spelen? In mijn land zijn de gezinnen groter. Het voordeel is dat je veel familie hebt. Ik vind dat erg gezellig! Al die ooms, tantes, neven en nichten! Nu woon je al een tijdje in Nederland. Je mist je familie zeker wel?","Ja, heel erg! Ik kan alleen met ze bellen! Maar gelukkig heb ik hier ook familie: mijn schoonfamilie! Zoals je weet ben ik getrouwd met een Nederlander. Mijn schoonouders wonen dichtbij. Ze komen vaak op bezoek. Mijn eigen familie woont ver weg. Kijk, hier zie je ze allemaal op deze foto\\'s. Dit is mijn jongste zus, dat zijn mijn oudste zus en haar man met hun zoon en op die bank zitten mijn broers. En dit zijn mijn ouders: mijn vader en mijn moeder.","Zijn dat je ouders? Echt waar? Ze zien er nog zo jong uit. Wat voor werk doen ze?","Mijn vader is de baas van een bedrijf. En mijn moeder is arts.","Dat is toevallig: mijn moeder ook. Maar ik zie haar niet zo vaak. Mijn ouders zijn gescheiden toen ik klein was. Mijn vader is docent op een school. Mijn oma paste op mij toen ik klein was. Ik houd veel van haar, en ik ga vaak naar haar toe. En we zien elkaar natuurlijk met de feestdagen en op verjaardagen. Leven jouw opa\\'s en oma\\'s nog?","Ik heb nog één oma. Zij is al 86. Mijn andere oma en mijn opa\\'s zijn al gestorven. Die heb ik helaas nooit gekend. Maar ik heb veel over hen gehoord!"], glossary:LESSON_GLOSSARY },
  15: { title:"Pakje bij de buren", lines:["Fred Wang gaat naar zijn buurman op nummer 8.","Dag buurman! Ik vond een briefje in de bus. Er staat op dat er een pakje voor mij bij u is gebracht. Klopt dat?","Hoi Fred. Inderdaad, hier ligt je pakje. Alsjeblieft.","Dank u wel. Ik zie het al: mijn nieuwe kleren zijn aangekomen. Tjonge, Fred, koop jij je kleren online? Dan kun je ze toch niet passen?","Jawel. Als ze niet passen stuur ik ze gewoon terug. En dan neem ik weer andere. Ik vind online kopen heel makkelijk. Het is snel, goedkoop, en ik hoef niet naar de winkel.","Ik houd van winkelen. En ik houd ook van de markt. Ik vind het daar gezellig. Veel producten zijn op de markt goedkoper dan in de winkel, vooral aan het eind van de dag. Dan dalen vaak de prijzen. En vind je het nog te duur? Er is een goede kans dat de prijs nog verder zakt. Dan heb je dubbel voordeel. Wist je dat?","Ja, dat weet ik. Maar ik houd niet van de markt. De kwaliteit is vaak niet zo goed. Bovendien moet je soms lang wachten op je beurt! Nee, ik kom er niet graag. Mijn boodschappen koop ik allemaal online. Twee keer in de week krijg ik vers fruit en verse groente thuis. Er zit zelfs een recept bij, dat is makkelijk bij het koken.","Ik dacht dat studenten alleen maar pizza\\'s eten. Dat valt dus mee. Kom even binnen. Heb je zin in koffie?","Nee, ik heb nog veel te doen en ik moet koken vanavond. En daarna sporten. Tja, dat kan nog niet online.","Nou, misschien een andere keer dan. Dat doen we, afgesproken! Het was gezellig om even te praten. Bedankt voor uw hulp!","Geen probleem, graag gedaan. En succes met koken!"], glossary:LESSON_GLOSSARY },
  16: { title:"School", lines:["Ik heb twee kinderen. Mijn zoon Tom is vier en mijn dochter Kate is twaalf. Ze zitten op een Nederlandse basisschool. Tom zit in groep één en Kate zit in groep acht. Dat is het laatste jaar. Pas vanaf vijf jaar moeten kinderen naar school. Maar bijna alle kinderen beginnen al als ze vier jaar zijn. En Tom kon niet wachten om naar school te gaan!","Voor sommige scholen moet je je kind al inschrijven als ze baby zijn. Maar gelukkig was er voor deze school géén wachtlijst. We hebben gekozen voor een openbare school in de buurt. Omdat de afstand van huis naar school klein is, kan Kate zelf met de fiets naar school en hoeven wij alleen Tom te brengen. De school organiseert ook opvang na school voor de leerlingen. Dat is makkelijk als we allebei moeten werken. De kinderen hebben het erg naar hun zin, zowel op de opvang als op school.","Zelf vond ik school vroeger helemaal niet leuk. Ik was bang voor mijn juffrouw. Die was namelijk erg streng. We moesten de hele dag stil zijn en de druk was erg hoog. Dat is hier heel anders. In groep één en twee leren de leerlingen vooral samen spelen en hun handen goed gebruiken. Ze luisteren naar verhalen en zingen liedjes. Zo leren ze de betekenis van nieuwe woorden.","Pas in groep drie gaan ze echt schrijven, lezen en rekenen. Verder krijgen ze onder andere (o.a.) les in tekenen en leren ze over de wereld, de geschiedenis en de natuur: over allerlei bloemen, bomen en dieren. Ze hoeven thuis niet zo veel te doen voor school. Sommige ouders vinden dat slecht, maar de meeste ouders vinden het geluk van hun kinderen belangrijker dan hoge cijfers. In de groep van Kate mogen de meeste kinderen zelf kiezen naar welke middelbare school ze willen. Dat is een moeilijke keuze: er zijn veel verschillende scholen en elke school heeft zijn sterke en zwakke punten."], glossary:LESSON_GLOSSARY },
  17: { title:"Wie doet het huishouden?", lines:["Uit onderzoek blijkt dat een op de vier Nederlanders helemaal geen zin heeft in het huishouden doen. 25 procent! Is dat werkelijk zo? We vragen het aan een paar mensen.","Meneer, doet u graag het huishouden?","Absoluut! Ik kook graag. Ik zet heerlijke koffie en ik doe wat dagelijkse dingen, zoals opruimen en afwassen. Maar schoonmaken, de was doen en dat soort zaken, daar heb ik een aardige mevrouw voor. Ze komt elke week. Ik betaal haar, uiteraard. Ik ben tevreden!","Mevrouw, mogen we u wat vragen? Hebt u plezier in het huishouden?","Nou nee, dat is niet mijn hobby. Maar iemand moet het doen! Het is wel makkelijk, tegenwoordig. Mijn moeder, die moest hard werken! Zes kinderen, en geen wasmachine. Mijn vader werkte tot laat in de avond. Die had geen tijd om te helpen. Maar dat is verleden tijd. Neem mijn dochter. Zij verdient het geld en haar man zorgt voor de kinderen en maakt het huis schoon. Een modern gezin!","En jij? Maak jij graag het huis schoon?","Ik woon met dertien studenten in een huis, allemaal vrouwen. We hebben een rooster, iedereen doet elke week iets. Maar het is onmogelijk om alles schoon te houden. De keuken blijft nooit lang schoon. Deze week moet ik de badkamer en het toilet doen. Dat soort taken, daar heb ik inderdaad niet zoveel zin in.","Mogen we jullie wat vragen? Hebben jullie de taken in het huishouden verdeeld?","Niet echt. Vroeger deden we alles samen. Nu heeft mijn vrouw een volledige baan. Ik werk halve dagen. Ik doe het grootste deel van het huishouden, denk ik. Wie er kookt? Degene die het eerst thuis is! Dat is meestal mijn vrouw. Zij kan heerlijk koken. En daarna wassen we gezellig samen af."], glossary:LESSON_GLOSSARY },
  18: { title:"De huisarts", lines:["Als je ziek bent ga je eerst naar de huisarts. Die kijkt ook of je naar het ziekenhuis moet gaan. De huisarts kan veel problemen oplossen. Bijvoorbeeld oorpijn, of pijn in je rug, been of hand. Samen met jou zoekt hij naar de oorzaak van je ziekte en kijkt hoe je weer beter kunt worden. Hij doet eerst goed onderzoek. Hij kijkt in je mond, luistert naar je hart, stelt vragen. Hij zal je bijvoorbeeld vragen: \"Eet u wel gezond? Heeft u misschien spanning op uw werk? Beweegt u genoeg?\" Ook kan de huisarts eerst je bloed laten onderzoeken. En als je medicijnen nodig hebt dan schrijft hij een recept. Heb je nog geen huisarts? Kijk dan even op internet, daar vind je ze allemaal. Je belt en vraagt: \"Heeft u nog ruimte voor een nieuwe patiënt?\"","Amber is al een paar dagen ziek. Ze belt daarom haar huisarts.","Goedemorgen, met de assistente van dokter Jansen. Kan ik u helpen?","Goedemorgen, met Amber Bakker. Ik wil graag zo snel mogelijk de dokter spreken.","Wat is er aan de hand? Is het ernstig?","Ja, ik ben al een paar dagen ziek. Mijn hele lichaam doet pijn. Volgens mij heb ik koorts. Mijn gezicht is helemaal rood! Bovendien heb ik erg veel last van hoofdpijn.","Even kijken ... Vanochtend om tien over half elf kunt u langskomen.","O, maar ik ben te ziek om naar het spreekuur te komen. Kan de dokter niet zelf komen?","Een momentje, ik overleg even met de dokter. Daar ben ik weer. De dokter komt vanmiddag bij u langs, vanochtend lukt niet meer, het spijt me.","Fijn, dank u wel. Wat kan ik ondertussen doen?","U moet veel drinken. Dat is belangrijk bij koorts.","Dat zal ik doen. Dank u wel. Dag mevrouw.","Dag mevrouw. Beterschap!"], glossary:LESSON_GLOSSARY },
  19: { title:"De bank", lines:["De bank weet veel van mij. Ze weet waar ik werk en waar ik boodschappen doe. Ze weet waar ik op vakantie ben en wat ik doe in mijn vrije tijd, en nog veel meer. En toch ben ik er nog nooit geweest. Ik heb een rekening aangevraagd via de website van de bank. Dat gaat heel makkelijk. Je kiest een soort rekening, je geeft je burgerservicenummer en klaar is Kees. Bij sommige banken moet je daarna nog even langskomen.","Je hebt een rekening nodig. Je werkgever kan zo elke maand je geld overmaken, van zijn rekening naar jouw rekening. Krijg je geld van de overheid? Ook dan is een rekening noodzakelijk. Studeer je in het buitenland? Je lieve ouders sturen je geld via je rekening. Met die rekening kun je ook van alles betalen. Parkeren bijvoorbeeld, dat regel je met je pasje of met je mobiel. Wil je de boodschappen betalen? Je gebruikt je pasje, je pint het bedrag. Je ov-kaart kun je met hetzelfde pasje opladen. Heb je contant geld nodig? De geldautomaat is 24 uur geopend. En de huur, en rekeningen die je elke maand moet betalen? Dat wordt automatisch overgemaakt.","Als je naar het buitenland gaat heb je soms een creditcard nodig. Die werkt ongeveer op dezelfde manier. De bank stelt dan wel de eis dat je genoeg verdient. Misschien heb je aan het eind van de maand meer uitgegeven dan ontvangen; dan sta je rood. Maar misschien staat er nog wat geld op je rekening. Dat is fijner. Sommigen maken dat over naar familie in het buitenland. Maar je kunt het ook bewaren voor later. En als je zomaar een paar miljoen rijker bent? Wat ga je doen met dat geld? De bank zal je graag advies geven - je eerste bezoek aan de bank."], glossary:LESSON_GLOSSARY },
  20: { title:"De mooiste reis", lines:["Ik houd erg van reizen. Ik heb al veel reizen gemaakt, zowel voor mijn werk als voor mijn plezier. Soms moet ik met collega\\'s voor een vergadering naar Londen of Brussel. We gaan dan meestal met het vliegtuig en slapen daar in een hotel. Als kind vond ik vliegen heel bijzonder. Met ons gezin gingen we bijna altijd met de auto op vakantie. We reden dan naar Frankrijk. Daar sliepen we in een tent en deden we spelletjes.","Mijn langste en verste reis was naar China, een paar jaar geleden. Eerst ging ik met de bus en de trein naar het vliegveld. Op internet vond ik alle informatie die ik nodig had: hoe lang het duurde, hoeveel het kostte. Alles ging mis die dag. De bus vertrok op time, maar kwam veel te laat op het station aan. Ook die trein had vertraging. Daardoor kwam ik te laat aan op het vliegveld en was mijn vliegtuig al weg. Het volgende vliegtuig ging pas \\'s avonds laat. Ik zat veertien uur in het vliegtuig. Maar dat was het waard. Ik was al lang van plan om naar China te gaan. Ik reisde met een groep. We hadden een vol programma, want er was van alles te zien. We hebben ook een reis gemaakt met de boot over de langste rivier van China. De steden en dorpen die we bezochten waren erg interessant. Tijdens de reis heb ik enorm veel foto\\'s gemaakt. Ook heb ik veel aardige mensen ontmoet. Met sommigen heb ik nog steeds contact.","De mooiste reis die ik heb gemaakt was de reis die we direct na mijn huwelijk hebben gemaakt. We gingen naar een eiland met hoge bergen en prachtige natuur. Er waren ook geweldige feesten met muziek en theater in de open lucht. Het was echt fantastisch!"], glossary:LESSON_GLOSSARY },
  21: { title:"Een dagje uit", lines:["Aan het begin van de les gaat Alex staan.","\"Mevrouw, mag ik iets vragen aan de groep?\"","\"Ja, natuurlijk Alex, ga je gang.\"","\"Ik dacht, misschien kunnen we binnenkort een keer samen uitgaan. In Rotterdam, bijvoorbeeld. We kunnen eerst naar de Markthal gaan. Dat schijnt een prachtig gebouw te zijn. Daarna kunnen we ergens anders wat gaan eten of drinken. Wat vinden jullie van het idee?\"","\"Wat een leuk idee! Ik ga graag mee. Rotterdam is een interessante stad met veel moderne gebouwen. Wanneer zullen we gaan?\"","\"Als het wat koeler is... dat is een goed idee! In het weekend is het beste, want dan heeft iedereen tijd. We kunnen afspreken op het centraal station van Rotterdam rond vier uur. En dan lopen we samen of nemen de metro naar de Markthal. Dat is het makkelijkst, want dan kunnen we daar rustig rondkijken, de sfeer proeven en beslissen wat we gaan eten. Ieder van ons kan zelf kiezen wat hij lekker vindt.\"","\"Laten we het aan de rest van de cursisten vragen om te zien wie er allemaal meegaat!\""], glossary:LESSON_GLOSSARY },
  22: { title:"De Nederlandse bevolking", lines:["Hoeveel mensen wonen er in Nederland? Dat hangt ervan af wanneer je het vraagt, want het aantal inwoners verandert elke dag. Als je de kaart bekijkt, zie je dat Nederland een relatief klein land is, maar er wonen heel veel mensen. Het is een van de dichtstbevolkte landen van Europa. Gemiddeld wonen er meer dan vierhonderd mensen per vierkante kilometer.","De bevolking is de afgelopen jaren nogal gegroeid. Die groei komt niet alleen door het aantal geboorten, want er sterven natuurlijk ook elke dag mensen. De belangrijkste reden voor de sterke groei is immigratie. Mensen uit de hele wereld komen naar Nederland.","De redenen waarom ze hiernaartoe komen, verschillen enorm. Sommigen komen hier omdat ze werk hebben gevonden of willen studeren. Anderen komen vanwege de liefde: ze zijn getrouwd met een Nederlander of komen bij hun familie wonen.","Helaas is er ook een grote groep mensen die hun eigen land onmiddellijk moest verlaten omdat het er door oorlog of politieke problemen niet meer veilig was. In Nederland noemen we deze mensen vluchtelingen. Zij zoeken hier een veilig leven en hopen snel een nieuw bestaan op te bouwen. Door al deze verschillende groepen is de Nederlandse samenleving erg divers geworden."], glossary:LESSON_GLOSSARY },
  23: { title:"Op de helft", lines:["Kijk eens aan, we zijn inmiddels op de helft van het boek! Sinds we met het eerste hoofdstuk zijn begonnen, hebben we al ontzettend veel verschillende onderwerpen behandeld. We hebben geleerd hoe je over jezelf praat, hoe je boodschappen doet, hoe het huishouden werkt en hoe je de weg vraagt. Je kent nu al honderden Nederlandse woorden.","Als je terugkijkt naar de eerste lessen, herinner je je vast nog hoe moeilijk het praten en luisteren toen was. Nu gaat het al een stuk sneller en begrijp je de docent veel beter. Maar we zijn er nog niet; we moeten nog de helft van de cursus doen om het niveau A2 te bereiken.","In de komende hoofdstukken gaan we dieper in op de Nederlandse cultuur, de geschiedenis, de geografie en hoe de politiek en de regels in het land georganiseerd zijn. Het belangrijkste blijft: elke dag de teksten stap voor stap herhalen, goed luisteren naar de uitspraak och vooral veel durven praten in de les. Op naar de tweede helft!"], glossary:LESSON_GLOSSARY },
  24: { title:"Trouwen, samenwonen of liever alleen blijven?", lines:["Als twee mensen verliefd zijn en samen de toekomst willen delen, moeten ze in Nederland beslissen hoe ze dat officieel willen regelen. Er zijn tegenwoordig verschillende vormen. Vroeger was het simpel: iedereen ging trouwen. Maar de tijden zijn veranderd.","Veel koppels kiezen er nu voor om eerst een lange tijd te gaan samenwonen zonder officiële papieren, of ze kiezen voor een geregistreerd partnerschap. Als je besluit om echt te gaan trouwen, doe je dat bij de gemeente. Je gaat dan naar het gemeentehuis.","Tijdens de officiële ceremonie is de aanwezigheid van een ambtenaar van de burgerlijke stand verplicht. En heel belangrijk: de getuige moet ook aanwezig zijn! Waarom eigenlijk? De getuige is er voor de controle van het officiële deel en om te bewijzen dat het huwelijk echt heeft plaatsgevonden. Als de getuige te laat is, kan de dienst niet beginnen! Na het officiële deel in het gemeentehuis beloven de partners elkaar trouw en volgt er meestal een mooi en groot feest met familie en vrienden.","Aan de andere kant zijn er ook heel veel mensen die er bewust voor kiezen om alleen te blijven. Ze vinden hun vrijheid belangrijk, willen zich focussen op hun carrière of hebben simpelweg de juiste persoon nog niet ontmoet. In Nederland is elke keuze gelijkwaardig en geaccepteerd."], glossary:LESSON_GLOSSARY },
  25: { title:"De kaart van Nederland", lines:["Als je de kaart van Nederland goed bekijkt, valt je meteen één ding op: er is ontzettend veel water. Overal zie je grote rivieren, brede kanalen, meren en natuurlijk de lange kustlijn aan de Noordzee. Maar wat de kaart je niet direct vertelt, is dat een heel groot deel de bewoonde wereld eigenlijk onder het zeeniveau ligt.","Als er geen dijken, duinen en speciale pompen (gemalen) zouden zijn, zou bijna de helft van het land onder water staan! Nederlanders vechten al eeuwenlang tegen het water, maar ze werken er ook mee samen. Het water is cruciaal voor de landbouw en het transport van goederen via de grote havens, zoals die van Rotterdam.","Het land is verdeeld in twaalf provincies. Elke provincie heeft haar eigen cultuur, een eigen landschap en natuurlijk een eigen hoofdstad. De Randstad, het gebied in het westen waar de vier grootste steden (Amsterdam, Rotterdam, Den Haag en Utrecht) dicht bij elkaar liggen, is het economische hart van het land. Als je van het westen naar het oosten of het noorden reist, merk je dat het landschap rustiger, groener en veel minder druk wordt."], glossary:LESSON_GLOSSARY },
  26: { title:"De politie: (niet) m\\'n beste vriend!", lines:["In Nederland hoor je vaak de uitdrukking \"De politie is je beste vriend\". Maar is dat ook echt zo? Dat hangt erg af van de situatie waarin je je bevindt!","De belangrijkste taak van de politie is het handhaven van de openbare orde, het beschermen van de burgers en het controleren of iedereen zich aan de wetten en regels houdt. Als er sprake is van een gevaarlijke noodsituatie, een ernstig ongeluk of een misdrijf, moet je onmiddellijk het landelijke alarmnummer 112 bellen. De politie, en vaak ook de ambulance of brandweer, komt dan zo snel mogelijk naar je toe om te helpen.","Als er geen spoed is, maar je hebt wel de politie nodig – bijvoorbeeld omdat je fiets is gestolen of je overlast hebt van de buren – dan gebruik je het normale nummer: 0900-8844. De politieagenten in Nederland zijn over het algemeen heel toegankelijk en vriendelijk. Je kunt ze op straat gewoon aanspreken om de weg te vragen of om iets te melden.","Natuurlijk vindt niemand het leuk als je een boete krijgt omdat je te hard hebt gereden met de auto of je fiets verkeerd hebt geparkeerd. Op dat moment voelt de politie misschien even niet als je beste vriend, maar die regels zijn er wel om te zorgen dat het land voor iedereen veilig en leefbaar blijft."], glossary:LESSON_GLOSSARY },
};

// ═══════ VOCABULARY & SENTENCE TRANSLATION EXERCISES ═══════
function vocabKey(nl){ return 'W::'+nl; }
function vocabBase(nl){ return nl.replace(/\(.*?\)/g,'').trim(); }

// Word translation MC. dir: 'nl2en' | 'en2nl'
function buildVocabQ(les, dir, excludeNl){
  const pool = VOCAB[les];
  if(!pool || pool.length < 4) return null;
  const avail = excludeNl ? pool.filter(p=>!excludeNl.has(p[0])) : pool;
  if(!avail.length) return null;
  // prioritise words not yet seen
  const unseen = avail.filter(p => !STORE.vocabSeen[vocabKey(p[0])]);
  const src = unseen.length ? unseen : avail;
  const pick = src[Math.floor(Math.random()*src.length)];
  const others = shuffle(pool.filter(p => p[1].toLowerCase()!==pick[1].toLowerCase() && p[0]!==pick[0])).slice(0,3);
  if(others.length < 3) return null;
  const assoc = getAssoc(vocabBase(pick[0]).toLowerCase());
  if(dir === 'en2nl'){
    const opts = shuffle([pick[0], ...others.map(o=>o[0])]);
    return { type:'multiple_choice', _wkey:vocabKey(pick[0]),
      question:`Hoe zeg je '${pick[1]}' in het Nederlands?`,
      options:opts, correct:opts.indexOf(pick[0]),
      explanation:`${pick[1]} = '${pick[0]}'.` + (assoc?' &#128161; '+assoc:'') };
  }
  const opts = shuffle([pick[1], ...others.map(o=>o[1])]);
  return { type:'multiple_choice', _wkey:vocabKey(pick[0]),
    question:`Wat betekent '${pick[0]}'?`,
    options:opts, correct:opts.indexOf(pick[1]),
    explanation:`'${pick[0]}' = ${pick[1]}.` + (assoc?' &#128161; '+assoc:'') };
}

// Sentence translation MC (NL sentence -> pick EN translation)
function buildSentenceQ(les){
  const pool = SENTENCES[les];
  if(!pool || !pool.length) return null;
  const pick = pool[Math.floor(Math.random()*pool.length)];
  let others = pool.filter(p=>p[1]!==pick[1]).map(p=>p[1]);
  if(others.length < 3){
    const all = Object.values(SENTENCES).flat().map(p=>p[1])
      .filter(t => t!==pick[1] && !others.includes(t));
    others = others.concat(shuffle(all));
  }
  const distractors = others.slice(0,3);
  if(distractors.length < 3) return null;
  const opts = shuffle([pick[1], ...distractors]);
  return { type:'multiple_choice', _skey:'S::'+pick[0],
    question:`Wat betekent: “${pick[0]}”`,
    options:opts, correct:opts.indexOf(pick[1]),
    explanation:`“${pick[0]}” = ${pick[1]}` };
}

let _sessionStart = null;
function startSessionTimer(){ _sessionStart = Date.now(); }
function flushSessionTime(){
  if(_sessionStart===null) return;
  const elapsed = Math.round((Date.now()-_sessionStart)/1000);
  _sessionStart = Date.now(); // reset anchor for continuous accumulation
  if(elapsed<=0 || elapsed>3600) return; // ignore absurd gaps (idle/backgrounded >1h)
  const today = todayStr();
  STORE.timeByDay[today] = (STORE.timeByDay[today]||0) + elapsed;
  saveStore();
}
function stopSessionTimer(){ flushSessionTime(); _sessionStart=null; }
function fmtDuration(sec){
  const m=Math.round(sec/60);
  if(m<60) return m+' min';
  const h=Math.floor(m/60), mm=m%60;
  return h+'u '+(mm>0?mm+'m':'');
}

// ── Streak helpers ──
function todayStr() {
  // Returns local date as 'YYYY-MM-DD'
  const d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}
function daysBetween(a, b) {
  // a, b are 'YYYY-MM-DD' strings
  const da = new Date(a), db = new Date(b);
  return Math.round((db - da) / 86400000);
}
function checkAndUpdateStreak() {
  // Called when a full lesson is completed
  const today = todayStr();
  const last = STORE.streakLastDay;
  if (!last) {
    // First ever completion
    STORE.streak = 1;
    STORE.streakLastDay = today;
    STORE.streakFrozen = false;
  } else if (last === today) {
    // Already completed today — no change, just unfreeze if frozen
    STORE.streakFrozen = false;
  } else {
    const diff = daysBetween(last, today);
    if (diff === 1) {
      // Yesterday → perfect streak
      STORE.streak += 1;
      STORE.streakLastDay = today;
      STORE.streakFrozen = false;
    } else if (diff === 2 && STORE.streakFrozen) {
      // Missed exactly 1 day but grace was active → extend streak
      STORE.streak += 1;
      STORE.streakLastDay = today;
      STORE.streakFrozen = false;
    } else if (diff >= 2) {
      // Missed too many days → reset
      STORE.streak = 1;
      STORE.streakLastDay = today;
      STORE.streakFrozen = false;
    }
  }
  saveStore();
}
function getStreakStatus() {
  // Returns: {streak, status: 'active'|'frozen'|'broken'|'none', doneToday}
  const today = todayStr();
  const last = STORE.streakLastDay;
  if (!last || STORE.streak === 0) return { streak: 0, status: 'none', doneToday: false };
  const diff = daysBetween(last, today);
  const doneToday = diff === 0;
  if (doneToday) return { streak: STORE.streak, status: 'active', doneToday: true };
  if (diff === 1) return { streak: STORE.streak, status: 'active', doneToday: false };
  if (diff === 2 && STORE.streakFrozen) return { streak: STORE.streak, status: 'frozen', doneToday: false };
  return { streak: STORE.streak, status: 'broken', doneToday: false };
}
function activateGrace() {
  // Called at app open: if missed yesterday, set grace
  const s = getStreakStatus();
  if (s.status === 'active' && !s.doneToday && s.streak > 0) {
    if (!STORE.streakFrozen) {
      STORE.streakFrozen = true;
      saveStore();
    }
  }
}

function itemKey(ex, lessonNum){
  const base = ex.question || (ex.sentence?ex.sentence.join('_'):'') || (ex.pairs?ex.pairs.map(p=>p.nl).join(','):'');
  return lessonNum+'::'+ex.type+'::'+base.slice(0,60);
}

  const trans = data.glossary[word] || '(geen vertaling)';
  window._lastWord = word;
  document.getElementById('popupWord').textContent = word;
  document.getElementById('popupTrans').textContent = trans;
  document.getElementById('wordPopup').style.display = 'block';
  speakWord(word);
}
function tapWordAudio(word){ window._lastWord=word; speakWord(word); }
function closeWordPopup(){ document.getElementById('wordPopup').style.display='none'; }
function speakWord(word){
  if(!word || !('speechSynthesis' in window)) return;
  try{
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(word);
    u.lang = 'nl-NL';
    u.rate = 0.85;
    window.speechSynthesis.speak(u);
  }catch(e){}
}

let _statsMonth = null; // {year, month} being viewed

function openStats(){
  const d=new Date();
  _statsMonth={year:d.getFullYear(), month:d.getMonth()};
  showScreen('statsScreen');
  renderStats();
  window.scrollTo(0,0);
}
function statsPrevMonth(){
  _statsMonth.month--; if(_statsMonth.month<0){_statsMonth.month=11;_statsMonth.year--;}
  renderStats();
}
function statsNextMonth(){
  const now=new Date();
  // don't go past current month
  if(_statsMonth.year===now.getFullYear() && _statsMonth.month>=now.getMonth()) return;
  _statsMonth.month++; if(_statsMonth.month>11){_statsMonth.month=0;_statsMonth.year++;}
  renderStats();
}
function renderStats(){
  const {year,month}=_statsMonth;
  const monthNames=['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
  document.getElementById('statsMonthLabel').textContent=monthNames[month]+' '+year;

  // totals
  let allTime=0, thisMonth=0, daysActive=0;
  Object.entries(STORE.timeByDay).forEach(([day,sec])=>{
    allTime+=sec;
    const [y,m]=day.split('-').map(Number);
    if(y===year && m===month+1){ thisMonth+=sec; if(sec>0) daysActive++; }
  });
  document.getElementById('statsTotals').innerHTML=
    `<div class="stat-card"><div class="num" style="color:#9d4edd;">${fmtDuration(thisMonth)}</div><div class="label">Deze maand</div></div>`+
    `<div class="stat-card"><div class="num green">${daysActive}</div><div class="label">Actieve dagen</div></div>`+
    `<div class="stat-card"><div class="num orange">${fmtDuration(allTime)}</div><div class="label">Totaal</div></div>`;

  // bar chart per day of month
  const daysInMonth=new Date(year,month+1,0).getDate();
  let maxSec=60;
  for(let dnum=1;dnum<=daysInMonth;dnum++){
    const key=year+'-'+String(month+1).padStart(2,'0')+'-'+String(dnum).padStart(2,'0');
    maxSec=Math.max(maxSec, STORE.timeByDay[key]||0);
  }
  let bars='<div style="display:flex;align-items:flex-end;gap:2px;height:160px;padding:8px;background:var(--card);border-radius:12px;border:1px solid var(--border);">';
  const todayKey=todayStr();
  for(let dnum=1;dnum<=daysInMonth;dnum++){
    const key=year+'-'+String(month+1).padStart(2,'0')+'-'+String(dnum).padStart(2,'0');
    const sec=STORE.timeByDay[key]||0;
    const h=sec>0?Math.max(4,Math.round(sec/maxSec*130)):2;
    const isToday=key===todayKey;
    const color=sec>0?(isToday?'#FFC800':'#9d4edd'):'var(--border)';
    const mins=Math.round(sec/60);
    bars+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;" title="${dnum}: ${mins} min">`+
      `<div style="width:100%;height:${h}px;background:${color};border-radius:3px 3px 0 0;"></div>`+
      (dnum%5===0||dnum===1?`<div style="font-size:9px;color:var(--text-muted);margin-top:3px;">${dnum}</div>`:`<div style="font-size:9px;margin-top:3px;">&nbsp;</div>`)+
      `</div>`;
  }
  bars+='</div>';
  bars+='<div style="font-size:12px;color:var(--text-muted);text-align:center;margin-top:8px;">Minuten per dag &bull; &#127993; vandaag</div>';
  document.getElementById('statsChart').innerHTML=bars;
}
