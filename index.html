// ═══════════════════ EXTRA BLOCK GENERATOR (rounds 2 & 3) ═══════════════════
// Builds additional exercises from already-verified content (verbs + vocab pairs),
// so no new Dutch sentences are invented.
function buildExtraBlock(lessonNum, blockSeed){
  const lesson = LESSONS[lessonNum];
  const pool = [];
  const usedNl = new Set();

  // 1. Vocabulary word-translation: the core of rounds 2/3 (5-6 per block)
  //    blockSeed 2 -> NL->EN, blockSeed 3 -> mix both directions
  for(let i=0; i<6; i++){
    const dir = (blockSeed >= 3 && i % 2 === 1) ? 'en2nl' : 'nl2en';
    const q = buildVocabQ(lessonNum, dir, usedNl);
    if(q){ usedNl.add(q._wkey.slice(3)); pool.push(q); }
  }

  // 2. Sentence translation (1-2 per block)
  const s1 = buildSentenceQ(lessonNum); if(s1) pool.push(s1);
  const s2 = buildSentenceQ(lessonNum);
  if(s2 && (!s1 || s2._skey !== s1._skey)) pool.push(s2);

  // 3. Verbs tagged to this lesson (2-3 per block)
  const lessonVerbs = shuffle(VERBS.filter(v => v.les === lessonNum)).slice(0,3);
  lessonVerbs.forEach((v,i) => {
    const tense = blockSeed >= 3 ? (i===0?'tt':(i===1?'perf':'meaning')) : (i===0?'meaning':'tt');
    const q = buildVerbQuestion(v, tense) || buildVerbQuestion(v,'meaning');
    if(q) pool.push(q);
  });

  // 4. Top up with safe original MCs if short
  if(pool.length < 10){
    const safeOriginals = shuffle(lesson.exercises.filter(e =>
      e.type==='multiple_choice' &&
      !/meneer wang|paula|amber|inge|katja|benjamim|david|leo /i.test(e.question)
    ));
    for(const e of safeOriginals){ if(pool.length>=10) break; pool.push(e); }
  }

  // Dedupe + interleave + cap at 10
  const seen = new Set();
  const unique = pool.filter(q => {
    const k = q.question || JSON.stringify(q.options);
    if(seen.has(k)) return false; seen.add(k); return true;
  });
  return interleaveByType(shuffle(unique)).slice(0,10).map(ex => ({ex, lessonNum}));
}

// Interleave a flat exercise array by type (no 3-in-a-row of same type)
function interleaveByType(items){
  const buckets={};
  items.forEach(it=>{ const t=it.type||it.ex?.type; (buckets[t]=buckets[t]||[]).push(it); });
  const out=[]; let added=true;
  while(added){ added=false;
    shuffle(Object.keys(buckets)).forEach(t=>{ if(buckets[t].length){ out.push(buckets[t].shift()); added=true; } });
  }
  return out;
}

// ═══════════════════ SESSION BUILDERS ═══════════════════
function startLesson(num){
  mode='lesson'; currentLessonNum=num;
  const lesson=LESSONS[num]; if(!lesson) return;
  // Rotate blocks: round 0 = original curated, rounds 1-2 = generated from verified content
  const completed = STORE.lessonRounds[num] || 0;
  const block = completed % 3;  // cycle through 3 blocks
  currentLessonBlock = block;
  if(block === 0){
    const raw = shuffle(lesson.exercises.map(ex=>({ex,lessonNum:num}))).slice(0,8);
    const used = new Set();
    const v1 = buildVocabQ(num,'nl2en',used); if(v1){used.add(v1._wkey.slice(3)); raw.push({ex:v1,lessonNum:num});}
    const v2 = buildVocabQ(num,'nl2en',used); if(v2) raw.push({ex:v2,lessonNum:num});
    queue = interleaveTypes(shuffle(raw));
  } else {
    const extra = buildExtraBlock(num, block+1);
    // fallback to original if generator returned too few
    queue = extra.length >= 6 ? extra : interleaveTypes(shuffle(lesson.exercises.map(ex=>({ex,lessonNum:num}))));
  }
  beginSession();
}
function interleaveTypes(items) {
  // Separate by type
  const buckets = {};
  items.forEach(item => {
    const t = item.ex.type;
    if(!buckets[t]) buckets[t] = [];
    buckets[t].push(item);
  });
  // Round-robin across types
  const result = [];
  const types = Object.keys(buckets);
  let added = true;
  while(added) {
    added = false;
    // Shuffle type order each round for variety
    shuffle(types).forEach(t => {
      if(buckets[t].length > 0) {
        result.push(buckets[t].shift());
        added = true;
      }
    });
  }
  return result;
}
function startReview(){
  const due=getDueReviewItems();
  if(due.length===0) return;
  mode='review'; currentLessonNum=null;
  // prioritise learning items, then by soonest dueDate
  const sorted=[...due].sort((a,b)=>{
    if(a.stage!==b.stage) return a.stage==='learning'?-1:1;
    return (a.dueDate||0)-(b.dueDate||0);
  }).slice(0,15);
  queue=sorted.map(d=>({ex:d.ex,lessonNum:d.lessonNum,_reviewRef:d}));
  beginSession();
}
function startTrain(){
  mode='train'; currentLessonNum=null;
  const sel=STORE.trainLessons;
  let all=[];
  for(const num of sel){ if(LESSONS[num]) LESSONS[num].exercises.forEach(ex=>all.push({ex,lessonNum:num})); }
  all.sort((a,b)=>{const ka=itemKey(a.ex,a.lessonNum),kb=itemKey(b.ex,b.lessonNum);return (STORE.correctStreak[ka]||0)-(STORE.correctStreak[kb]||0);});
  queue=all; beginSession();
}
function startVerb(){
  mode='verb'; currentLessonNum=null;
  const tenses=STORE.verbTenses;

  // Build a pool of (verb, tense) PAIRS — not pre-rendered questions.
  // Questions are generated fresh at render time so persons/forms vary each time.
  // Importance weighting: higher freq → appears more often, but we cap to avoid clustering.
  let pool = [];
  VERBS.forEach(v=>{
    const weight = Math.max(1, v.freq - 2); // freq 5→3, 4→2, 3→1
    tenses.forEach(t=>{
      // skip impossible combos
      if(t==='tt' && v.tt.hij==='-' && v.tt.ik==='-') return;
      if(t==='perf' && !v.perf.pp) return;
      for(let w=0; w<weight; w++) pool.push({verb:v.inf, tense:t});
    });
  });

  // Sort weak items first (low streak), then shuffle within tiers
  const streakOf = p => {
    // approximate key — meaning/perf/futur are single, tt/ovt have sub-keys
    const base = 'V::'+p.verb+'::'+p.tense;
    let min = Infinity;
    Object.keys(STORE.correctStreak).forEach(k=>{
      if(k.startsWith(base)) min = Math.min(min, STORE.correctStreak[k]);
    });
    return min === Infinity ? 0 : min;
  };
  pool = shuffle(pool);
  pool.sort((a,b)=> streakOf(a) - streakOf(b));

  // Anti-clustering: rebuild order so the same verb never appears twice in a row
  const ordered = [];
  const remaining = [...pool];
  let lastVerb = null;
  while(remaining.length){
    // find first item whose verb differs from lastVerb
    let idx = remaining.findIndex(p => p.verb !== lastVerb);
    if(idx === -1) idx = 0; // all same verb left — unavoidable
    const picked = remaining.splice(idx,1)[0];
    ordered.push(picked);
    lastVerb = picked.verb;
  }

  // Convert pool entries to lazy queue items — question built fresh on render
  queue = ordered.map(p => ({ _verbLazy: p, lessonNum:'V', _verb: p.verb }));
  beginSession();
}

function beginSession(){currentIndex=0;sessionCorrect=0;sessionWrong=0;wrongThisSession=[];startSessionTimer();showScreen('exerciseScreen');renderQuestion();window.scrollTo(0,0);}

// ═══════════════════ VERB QUESTION GENERATOR ═══════════════════
function buildVerbQuestion(v, tense, personOverride){
  // personOverride lets tt/ovt vary across ik/jij/hij/wij/jullie
  if(tense==='meaning'){
    const vkey = 'V::'+v.inf+'::meaning';
    const distractors = shuffle(VERBS.filter(x=>x.inf!==v.inf)).slice(0,3).map(x=>x.en);
    const opts = shuffle([v.en, ...distractors]);
    return { type:'multiple_choice', _vkey:vkey, _verb:v.inf,
      question:`Wat betekent het werkwoord '${v.inf}'?`,
      options:opts, correct:opts.indexOf(v.en),
      explanation:`'${v.inf}' = ${v.en}.` + (v.irregular?' (onregelmatig werkwoord)':'') + (getAssoc(v.inf)?' &#128161; '+getAssoc(v.inf):'') };
  }
  if(tense==='tt'){
    // Pick a person: ik / jij / hij / wij (jullie = same as wij form)
    const persons = [
      {key:'ik',  label:'ik',       form:v.tt.ik},
      {key:'jij', label:'jij',      form:v.tt.jij},
      {key:'hij', label:'hij/zij',  form:v.tt.hij},
      {key:'wij', label:'wij',      form:v.tt.wij},
      {key:'jullie', label:'jullie', form:v.tt.wij}
    ].filter(p => p.form && p.form !== '-');
    if(persons.length===0) return null;
    const p = personOverride ? (persons.find(x=>x.key===personOverride)||persons[Math.floor(Math.random()*persons.length)]) : persons[Math.floor(Math.random()*persons.length)];
    const ans = p.form;
    const vkey = 'V::'+v.inf+'::tt::'+p.key;
    // distractors: other persons' forms + infinitive
    const wrongForms = persons.filter(x=>x.form!==ans).map(x=>x.form).concat([v.inf, v.ovt.sing]);
    const distractors = [...new Set(wrongForms.filter(x=>x&&x!==ans&&x!=='-'))].slice(0,3);
    while(distractors.length < 3) distractors.push(['loopt','woont','gaat','werkt','maakt'].find(x=>x!==ans&&!distractors.includes(x))||'is');
    const opts = shuffle([ans, ...distractors.slice(0,3)]);
    return { type:'multiple_choice', _vkey:vkey, _verb:v.inf,
      question:`Tegenwoordige tijd — '${p.label} ___' (${v.inf} = ${v.en})`,
      options: opts, correct: opts.indexOf(ans),
      explanation:`${p.label} ${ans}. Vervoeging van '${v.inf}': ik ${v.tt.ik} | jij ${v.tt.jij} | hij/zij ${v.tt.hij} | wij ${v.tt.wij}.` };
  }
  if(tense==='perf'){
    if(!v.perf.pp) return null;
    const vkey = 'V::'+v.inf+'::perf';
    const distractors = shuffle(VERBS.filter(x=>x.perf.pp&&x.perf.pp!==v.perf.pp)).slice(0,3).map(x=>x.perf.pp);
    const opts = shuffle([v.perf.pp, ...distractors]);
    return { type:'multiple_choice', _vkey:vkey, _verb:v.inf,
      question:`Voltooid deelwoord van '${v.inf}' (${v.en})?`,
      options:opts, correct:opts.indexOf(v.perf.pp),
      explanation:`${v.perf.aux} + ${v.perf.pp}. Bijv: 'Ik ${v.perf.aux==='zijn'?'ben':'heb'} ${v.perf.pp}.'` };
  }
  if(tense==='ovt'){
    // vary singular vs plural
    const usePlur = personOverride === 'plur' || (!personOverride && Math.random() < 0.4);
    const ans = usePlur ? v.ovt.plur : v.ovt.sing;
    const subj = usePlur ? 'wij' : 'ik';
    const vkey = 'V::'+v.inf+'::ovt::'+(usePlur?'plur':'sing');
    const wrongs = [usePlur?v.ovt.sing:v.ovt.plur, v.perf.pp||v.inf+'de', v.tt.hij].filter(x=>x&&x!==ans&&x!=='-');
    const distractors = [...new Set(wrongs)].slice(0,3);
    while(distractors.length < 3) distractors.push(['werkte','ging','was','deed','zag'].find(x=>x!==ans&&!distractors.includes(x))||'had');
    const opts = shuffle([ans, ...distractors.slice(0,3)]);
    return { type:'multiple_choice', _vkey:vkey, _verb:v.inf,
      question:`Verleden tijd (${usePlur?'meervoud':'enkelvoud'}) van '${v.inf}' (${v.en}) — ${subj} ___`,
      options: opts, correct: opts.indexOf(ans),
      explanation:`ik ${v.ovt.sing} (enkelvoud) / wij ${v.ovt.plur} (meervoud). '${v.inf}' = ${v.en}.`+(v.irregular?' ⚠ Onregelmatig!':'') };
  }
  if(tense==='futur'){
    const vkey = 'V::'+v.inf+'::futur';
    const correct=`Ik ga ${v.inf}`;
    const opts=shuffle([correct, `Ik ben ${v.inf}`, `Ik heb ${v.inf}`, `Ik word ${v.inf}`]);
    return { type:'multiple_choice', _vkey:vkey, _verb:v.inf,
      question:`Hoe vorm je de toekomende tijd van '${v.inf}' (${v.en})?`,
      options:opts, correct:opts.indexOf(correct),
      explanation:`Toekomst: 'gaan' of 'zullen' + infinitief. 'Ik ga ${v.inf}' of 'Ik zal ${v.inf}'.` };
  }
  return null;
}

// ═══════════════════ RENDER QUESTION ═══════════════════
function renderQuestion(){
  isAnswered=false;selectedOption=null;fillAnswer='';wbWords=[];
  matchedPairs=0;matchSideL=matchSideR=matchSideLPair=matchSideRPair=null;
  hideFeedback();hideCheckArea();
  if((mode==='train'||mode==='verb') && currentIndex>=queue.length){queue=shuffle(queue);currentIndex=0;if(mode==='verb')queue.forEach(n=>{if(n._verbLazy)n.ex=null;});}
  if(currentIndex>=queue.length){showResults();return;}
  const node=queue[currentIndex];
  // Lazy verb question: build fresh so person/form varies each appearance
  if(node._verbLazy && !node.ex){
    const v = VERBS.find(x=>x.inf===node._verbLazy.verb);
    node.ex = buildVerbQuestion(v, node._verbLazy.tense) || buildVerbQuestion(v,'meaning');
  }
  currentEx=node; const ex=node.ex; const total=queue.length;

  const pb=document.getElementById('progressBar');
  if(mode==='train'||mode==='verb'){
    pb.style.width='100%'; pb.style.background=mode==='verb'?'var(--blue)':'var(--purple)';
    document.getElementById('headerStat').innerHTML=(mode==='verb'?'&#9889; ':'&#9851; ')+(sessionCorrect+sessionWrong)+' gedaan';
  } else {
    pb.style.background=mode==='review'?'var(--orange)':'var(--green)';
    pb.style.width=(currentIndex/total*100)+'%';
    document.getElementById('headerStat').innerHTML='';
  }

  let label;
  if(mode==='review') label=`Foutenrevisie &bull; ${currentIndex+1} / ${total}`;
  else if(mode==='train') label=`Oneindig trainen &bull; Les ${node.lessonNum}`;
  else if(mode==='verb') label=`Werkwoorden &bull; ${node._verb}`;
  else label=`${LESSONS[node.lessonNum].title} &bull; ${currentIndex+1} / ${total}`;
  document.getElementById('exLabel').innerHTML=label;

  const badges={multiple_choice:'Meerkeuze',fill_blank:'Invullen',word_order:'Woordvolgorde',match_pairs:'Koppelen'};
  const badge=document.getElementById('exTypeBadge');
  badge.textContent=badges[ex.type]||ex.type;
  badge.className='ex-type-badge'+(mode==='review'?' review':mode==='verb'?' verb':'');

  let grammarHTML='';
  if(mode==='lesson'&&currentIndex===0&&LESSONS[node.lessonNum].grammarTip){
    const tip=LESSONS[node.lessonNum].grammarTip;
    const rows=tip.table.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('');
    const heads=tip.headers?`<tr>${tip.headers.map(h=>`<th>${h}</th>`).join('')}</tr>`:'';
    grammarHTML=`<div class="grammar-tip"><strong>${tip.title}</strong><table>${heads}${rows}</table></div>`;
  }

  document.getElementById('exTitle').textContent=ex.question||'';
  document.getElementById('exContent').innerHTML=grammarHTML+renderContent(ex);

  showCheckArea();
  const checkBtn=document.getElementById('checkBtn');
  checkBtn.className='check-btn'; checkBtn.onclick=primaryButtonAction;
  document.getElementById('skipBtn').style.display=(mode==='train'||mode==='verb')?'block':'none';
  if(ex.type==='match_pairs'){totalPairs=ex.pairs.length;checkBtn.disabled=true;checkBtn.textContent=`Koppel alle ${totalPairs} paren`;}
  else if(ex.type==='fill_blank'){checkBtn.disabled=true;checkBtn.textContent='CONTROLEER';setTimeout(()=>{const i=document.getElementById('blankInput');if(i)i.focus();},80);}
  else{checkBtn.disabled=true;checkBtn.textContent='CONTROLEER';}
}

function renderContent(ex){
  switch(ex.type){case 'multiple_choice':return renderMC(ex);case 'fill_blank':return renderFill(ex);case 'word_order':return renderWO(ex);case 'match_pairs':return renderMatch(ex);default:return'';}
}
function renderMC(ex){const L=['A','B','C','D','E'];return `<div class="options">${ex.options.map((o,i)=>`<button class="option-btn" data-idx="${i}" onclick="selectOption(${i})"><span class="opt-letter">${L[i]}</span>${o}</button>`).join('')}</div>`;}
function renderFill(ex){return `<div class="fill-sentence">${ex.sentence[0]}<input class="blank-input" id="blankInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" oninput="onFill(this.value)" onkeydown="if(event.key==='Enter'&&!isAnswered&&fillAnswer)checkAnswer()"/>${ex.sentence[1]||''}</div>${ex.hint?`<div class="fill-hint">&#128161; ${ex.hint}</div>`:''}`;}
function renderWO(ex){const chips=shuffle(ex.words.map((w,i)=>({w,i})));return `<div class="word-bank-sentence" id="wbSentence"><span style="color:var(--text-muted);font-size:15px">Tik op de woorden hieronder</span></div><div class="word-bank" id="wordBank">${chips.map(c=>`<button class="word-chip" data-idx="${c.i}" onclick="placeWord('${esc(c.w)}',${c.i})">${c.w}</button>`).join('')}</div>`;}
function renderMatch(ex){const left=ex.pairs.map((p,i)=>({id:'L'+i,text:p.nl,pi:i}));const right=shuffle(ex.pairs.map((p,i)=>({id:'R'+i,text:p.en,pi:i})));return `<div class="match-grid"><div class="match-col">${left.map(it=>`<div class="match-chip" data-id="${it.id}" onclick="matchClick('${it.id}',${it.pi})">${it.text}</div>`).join('')}</div><div class="match-col">${right.map(it=>`<div class="match-chip" data-id="${it.id}" onclick="matchClick('${it.id}',${it.pi})">${it.text}</div>`).join('')}</div></div>`;}

function selectOption(i){if(isAnswered)return;selectedOption=i;document.querySelectorAll('.option-btn').forEach((b,idx)=>b.classList.toggle('selected',idx===i));enableCheck();}
function onFill(v){fillAnswer=v.trim();document.getElementById('checkBtn').disabled=fillAnswer.length===0;}
function placeWord(w,idx){if(isAnswered)return;wbWords.push({w,idx});document.querySelector(`.word-chip[data-idx="${idx}"]`).classList.add('used');drawSentence();enableCheck();}
function removeWord(pi){if(isAnswered)return;const r=wbWords.splice(pi,1)[0];document.querySelector(`.word-chip[data-idx="${r.idx}"]`).classList.remove('used');drawSentence();if(wbWords.length===0)document.getElementById('checkBtn').disabled=true;}
function drawSentence(){const s=document.getElementById('wbSentence');if(!s)return;s.innerHTML=wbWords.length===0?'<span style="color:var(--text-muted);font-size:15px">Tik op de woorden hieronder</span>':wbWords.map((w,i)=>`<span class="word-placed" onclick="removeWord(${i})">${w.w}</span>`).join('');}
function enableCheck(){const b=document.getElementById('checkBtn');b.disabled=false;b.textContent='CONTROLEER';}

function matchClick(id,pi){
  if(isAnswered)return;
  const el=document.querySelector(`[data-id="${id}"]`);
  if(!el||el.classList.contains('matched-correct'))return;
  const isL=id.startsWith('L');
  if(isL){if(matchSideL)document.querySelector(`[data-id="${matchSideL}"]`)?.classList.remove('selected');matchSideL=id;matchSideLPair=pi;}
  else{if(matchSideR)document.querySelector(`[data-id="${matchSideR}"]`)?.classList.remove('selected');matchSideR=id;matchSideRPair=pi;}
  el.classList.add('selected');
  if(matchSideL&&matchSideR){
    const lEl=document.querySelector(`[data-id="${matchSideL}"]`),rEl=document.querySelector(`[data-id="${matchSideR}"]`);
    if(matchSideLPair===matchSideRPair){lEl.classList.remove('selected');rEl.classList.remove('selected');lEl.classList.add('matched-correct');rEl.classList.add('matched-correct');matchedPairs++;}
    else{lEl.classList.add('matched-wrong');rEl.classList.add('matched-wrong');const a=matchSideL,b=matchSideR;setTimeout(()=>{document.querySelector(`[data-id="${a}"]`)?.classList.remove('matched-wrong','selected');document.querySelector(`[data-id="${b}"]`)?.classList.remove('matched-wrong','selected');},550);}
    matchSideL=matchSideR=matchSideLPair=matchSideRPair=null;
    if(matchedPairs===totalPairs){const b=document.getElementById('checkBtn');b.disabled=false;b.textContent='VERDER';b.className='check-btn flip';isAnswered=true;gradeSilently(true);}
  }
}

function primaryButtonAction(){if(isAnswered){nextQuestion();return;}checkAnswer();}
function skipQuestion(){if(isAnswered)return;const ex=currentEx.ex;isAnswered=true;const ct=answerText(ex);revealAnswer(ex,false);gradeSilently(false);showFeedback(false,ex.explanation,ct,true);}

function checkAnswer(){
  if(isAnswered)return;
  const ex=currentEx.ex;let correct=false,correctText='';
  if(ex.type==='multiple_choice'){
    correct=selectedOption===ex.correct;correctText=ex.options[ex.correct];
    document.querySelectorAll('.option-btn').forEach((b,i)=>{b.disabled=true;if(i===ex.correct)b.classList.add('correct');else if(i===selectedOption&&!correct)b.classList.add('wrong');});
  }else if(ex.type==='fill_blank'){
    const spell = checkSpelling(fillAnswer, ex.blank);
    correct = (spell==='exact' || spell==='close');
    window._spellClose = (spell==='close');
    correctText=ex.blank;
    const inp=document.getElementById('blankInput');if(inp){inp.disabled=true;inp.classList.add(correct?'correct':'wrong');}
  }else if(ex.type==='word_order'){
    const placed=wbWords.map(w=>w.w).join(' ');correct=placed.toLowerCase()===ex.correct.toLowerCase();correctText=ex.correct;
  }
  isAnswered=true;grade(correct);showFeedback(correct,ex.explanation,correctText,!correct);
}

function answerText(ex){if(ex.type==='multiple_choice')return ex.options[ex.correct];if(ex.type==='fill_blank')return ex.blank;if(ex.type==='word_order')return ex.correct;if(ex.type==='match_pairs')return ex.pairs.map(p=>`${p.nl} = ${p.en}`).join(' • ');return'';}
function revealAnswer(ex){if(ex.type==='multiple_choice'){document.querySelectorAll('.option-btn').forEach((b,i)=>{b.disabled=true;if(i===ex.correct)b.classList.add('correct');});}else if(ex.type==='fill_blank'){const inp=document.getElementById('blankInput');if(inp){inp.disabled=true;inp.value=ex.blank;inp.classList.add('correct');}}}

function grade(correct){
  const ex=currentEx.ex,ln=currentEx.lessonNum;
  const key=ex._vkey||itemKey(ex,ln);
  STORE.seenCount[key]=(STORE.seenCount[key]||0)+1;
  if(correct){
    sessionCorrect++;STORE.correctStreak[key]=(STORE.correctStreak[key]||0)+1;
    if(ex._wkey) STORE.vocabSeen[ex._wkey]=true;
    const ref=currentEx._reviewRef;
    if(ref){
      ref.streak=(ref.streak||0)+1;
      if(ref.stage==='learning'){
        // advance through learning boxes; graduate after finishing the 3-week cycle
        ref.box=(ref.box||0)+1;
        if(ref.box>=SRS_LEARNING.length){
          // finished 3-week cycle → graduate, will return in ~1 month
          ref.stage='graduated';
          ref.dueDate=Date.now()+SRS_GRADUATED_DAYS*DAY_MS;
        }else{
          ref.dueDate=Date.now()+SRS_LEARNING[ref.box]*DAY_MS;
        }
      }else if(ref.stage==='graduated'){
        // got it right after the 1-month gap → mastered, remove permanently
        STORE.reviewQueue=STORE.reviewQueue.filter(r=>r!==ref);
      }
    }
  }else{
    sessionWrong++;STORE.correctStreak[key]=0;
    wrongThisSession.push({q:ex.question||(ex.sentence?ex.sentence.join(' ___ '):'')||'Koppelen',a:answerText(ex)});
    addToReview(ex,ln);
  }
  if(typeof ln==='number') updateMastery(ln);
  flushSessionTime();
  saveStore();
}
function gradeSilently(correct){grade(correct);}
// SRS intervals (in days). 'learning' = ~3-week cycle with growing gaps.
const SRS_LEARNING = [1, 3, 7, 21];   // box 0→1→2→3 within the 3-week window
const SRS_GRADUATED_DAYS = 30;        // after learning, return once after ~1 month
const DAY_MS = 86400000;

function reviewKey(ex, ln){ return ex._vkey || itemKey(ex, ln); }

function addToReview(ex,ln){
  const key=reviewKey(ex,ln);
  const existing=STORE.reviewQueue.find(r=>reviewKey(r.ex,r.lessonNum)===key);
  if(existing){
    // Wrong again → restart the learning cycle from the beginning
    existing.stage='learning';
    existing.box=0;
    existing.dueDate=Date.now()+SRS_LEARNING[0]*DAY_MS;
    existing.streak=0;
    return;
  }
  STORE.reviewQueue.push({
    ex, lessonNum:ln,
    stage:'learning', box:0,
    dueDate: Date.now()+SRS_LEARNING[0]*DAY_MS,
    streak:0
  });
}

// Items currently "due" for review (dueDate passed). In learning stage they show up.
function getDueReviewItems(){
  const now=Date.now();
  return STORE.reviewQueue.filter(r=>{
    // Learning items: always available to practise (the whole point — drill until learned)
    if(r.stage==='learning') return true;
    // Graduated items: only when their 1-month timer is up
    if(r.stage==='graduated') return (r.dueDate||0) <= now;
    return false;
  });
}

// Count shown on home badge = items needing attention now
function activeReviewCount(){ return getDueReviewItems().length; }
function updateMastery(ln){const lesson=LESSONS[ln];if(!lesson)return;let m=0;lesson.exercises.forEach(ex=>{if((STORE.correctStreak[itemKey(ex,ln)]||0)>=1)m++;});STORE.mastery[ln]=m/lesson.exercises.length;}

function showFeedback(correct,explanation,correctAnswer){
  hideCheckArea();
  const panel=document.getElementById('feedbackPanel'),inner=document.getElementById('feedbackInner');
  panel.classList.add('active');
  const isClose = correct && window._spellClose;
  inner.className='feedback-inner '+(isClose?'close':(correct?'correct':'wrong'));
  document.getElementById('feedbackIcon').innerHTML=isClose?'&#9998;':(correct?'&#9989;':'&#10060;');
  document.getElementById('feedbackTitle').textContent=isClose?'Goed! (kleine typefout)':(correct?goodMsg():'Bijna! Let op:');
  let ansHtml='';
  if(isClose) ansHtml='Correcte spelling: '+correctAnswer;
  else if(!correct&&correctAnswer) ansHtml='Antwoord: '+correctAnswer;
  document.getElementById('feedbackAnswer').innerHTML=ansHtml;
  document.getElementById('feedbackNote').innerHTML=explanation||'';
  const btn=document.getElementById('continueBtn');btn.className='continue-btn'+(correct?'':' wrong-btn');btn.textContent='VERDER';btn.focus();
  window._spellClose=false;
}
function hideFeedback(){document.getElementById('feedbackPanel').classList.remove('active');}
function goodMsg(){const m=['Goed zo!','Uitstekend!','Correct!','Helemaal goed!','Knap gedaan!','Prima!'];return m[Math.floor(Math.random()*m.length)];}

function nextQuestion(){hideFeedback();currentIndex++;renderQuestion();window.scrollTo(0,0);}

function showResults(){
  stopSessionTimer();
  hideCheckArea();hideFeedback();showScreen('resultsScreen');document.getElementById('progressBar').style.width='100%';
  // Streak: only a full lesson completion (mode==='lesson', all 10 exercises done) counts
  if(mode==='lesson' && sessionCorrect+sessionWrong >= 10){
    checkAndUpdateStreak();
    STORE.lessonRounds[currentLessonNum] = (STORE.lessonRounds[currentLessonNum]||0) + 1;
    saveStore();
  }
  const total=sessionCorrect+sessionWrong,inReview=activeReviewCount();
  document.getElementById('statCorrect').textContent=sessionCorrect;
  document.getElementById('statWrong').textContent=sessionWrong;
  document.getElementById('statReview').textContent=inReview;
  let icon,title,sub;const pct=total>0?Math.round(sessionCorrect/total*100):0;
  if(mode==='review'){icon='&#128260;';title='Revisie klaar!';sub=inReview>0?`Nog ${inReview} item(s). Items verdwijnen na 2x goed.`:'Geweldig — je foutenlijst is leeg!';}
  else if(pct>=90){icon='&#127942;';title='Fantastisch!';sub='Sterke beheersing.';}
  else if(pct>=70){icon='&#11088;';title='Goed gedaan!';sub='Je fouten staan klaar in de revisie.';}
  else if(pct>=50){icon='&#128170;';title='Goed begin!';sub='Herhaal je fouten — zo beklijft het.';}
  else{icon='&#128218;';title='Blijf oefenen!';sub='Herhaling is hoe het blijft hangen.';}
  document.getElementById('resultIcon').innerHTML=icon;
  document.getElementById('resultTitle').textContent=title;
  // Append streak info to subtitle if lesson was completed
  if(mode==='lesson' && sessionCorrect+sessionWrong >= 10){
    const s = getStreakStatus();
    const streakMsg = s.streak > 1
      ? ` &#128293; ${s.streak} dias seguidos!`
      : ' &#128293; Streak começa hoje!';
    sub += streakMsg;
  }
  document.getElementById('resultSubtitle').innerHTML=sub;
  const cont=document.getElementById('reviewListContainer');
  if(wrongThisSession.length>0){cont.innerHTML='<div class="section-label" style="text-align:left;max-width:480px;margin:0 auto 10px">Wat je fout had</div><div class="review-list">'+wrongThisSession.slice(0,8).map(w=>`<div class="review-item"><div class="ri-q">${w.q}</div><div class="ri-a">&#10003; ${w.a}</div></div>`).join('')+'</div>';}else{cont.innerHTML='';}
  const pb=document.getElementById('resultPrimary');
  if(activeReviewCount()>0){pb.innerHTML='&#128260; Oefen je fouten ('+activeReviewCount()+')';pb._action='review';}
  else{pb.innerHTML='&#127968; Terug naar home';pb._action='home';}
}
function resultPrimaryAction(){const a=document.getElementById('resultPrimary')._action;if(a==='review')startReview();else goHome();}

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function levenshtein(a,b){
  if(a===b) return 0;
  const m=a.length,n=b.length;
  if(m===0) return n; if(n===0) return m;
  let prev=Array(n+1).fill(0).map((_,i)=>i);
  for(let i=1;i<=m;i++){
    let cur=[i];
    for(let j=1;j<=n;j++){
      cur[j]=Math.min(prev[j]+1, cur[j-1]+1, prev[j-1]+(a[i-1]===b[j-1]?0:1));
    }
    prev=cur;
  }
  return prev[n];
}
// Returns: 'exact' | 'close' (1 typo) | 'wrong'
function checkSpelling(given, correct){
  const g=given.toLowerCase().trim().replace(/[.,!?]$/,'');
  const c=correct.toLowerCase().trim();
  if(g===c) return 'exact';
  // tolerance: 1 edit for words >=4 chars (avoid false positives on short words)
  if(c.length>=4 && levenshtein(g,c)<=1) return 'close';
  return 'wrong';
}
function esc(s){return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;');}
function showCheckArea(){document.getElementById('checkArea').classList.add('visible');}
function hideCheckArea(){document.getElementById('checkArea').classList.remove('visible');}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('feedbackPanel').classList.contains('active')){e.preventDefault();nextQuestion();}});
renderHome();
</script>
