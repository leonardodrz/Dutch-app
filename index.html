<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nederlands Oefenen — Delftse Methode L1–26</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#58CC02;--green-dark:#46A302;--blue:#1CB0F6;--blue-dark:#0E98D8;
    --red:#FF4B4B;--yellow:#FFC800;--yellow-light:#FFF9D8;--purple:#CE82FF;--orange:#FF9600;
    --bg:#131F24;--card:#1F2E35;--card2:#243640;--border:#37464F;
    --text:#F1F7FB;--text-muted:#8FA3AD;--radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;}
  .header{width:100%;max-width:720px;display:flex;align-items:center;justify-content:space-between;padding:16px 18px 8px;gap:14px;}
  .close-btn{background:none;border:none;font-size:24px;cursor:pointer;color:var(--text-muted);padding:4px;border-radius:8px;line-height:1;transition:color .15s;}
  .close-btn:hover{color:var(--text);}
  .progress-bar-wrap{flex:1;height:14px;background:var(--border);border-radius:99px;overflow:hidden;}
  .progress-bar-fill{height:100%;background:var(--green);border-radius:99px;transition:width .4s cubic-bezier(.34,1.4,.64,1);}
  .header-stat{font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;white-space:nowrap;display:flex;align-items:center;gap:5px;color:var(--orange);}
  .main{width:100%;max-width:720px;padding:16px 18px 150px;flex:1;}
  .screen{display:none;animation:fadeIn .25s ease;}
  .screen.active{display:block;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .home-hero{text-align:center;margin-bottom:22px;}
  .flag{font-size:40px;margin-bottom:4px;}
  .home-hero h1{font-family:'Nunito',sans-serif;font-weight:900;font-size:25px;margin-bottom:4px;}
  .home-hero p{color:var(--text-muted);font-size:14px;line-height:1.5;}
  .action-cards{display:flex;flex-direction:column;gap:12px;margin-bottom:26px;}
  .action-card{border:2px solid var(--border);border-bottom-width:4px;border-radius:var(--radius);padding:16px 18px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:all .12s;text-align:left;background:var(--card);width:100%;color:var(--text);font-family:inherit;}
  .action-card:active{transform:translateY(2px);border-bottom-width:2px;}
  .action-card .ac-icon{font-size:28px;width:50px;height:50px;display:flex;align-items:center;justify-content:center;border-radius:14px;flex-shrink:0;}
  .action-card .ac-body{flex:1;}
  .action-card .ac-title{font-family:'Nunito',sans-serif;font-weight:800;font-size:17px;margin-bottom:2px;}
  .action-card .ac-sub{font-size:13px;color:var(--text-muted);line-height:1.4;}
  .action-card .ac-badge{font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;padding:4px 12px;border-radius:99px;flex-shrink:0;}
  .ac-review{border-color:var(--orange);} .ac-review .ac-icon{background:rgba(255,150,0,.15);} .ac-review .ac-badge{background:var(--orange);color:#2b1900;}
  .ac-review.empty{border-color:var(--border);opacity:.55;} .ac-review.empty:active{transform:none;border-bottom-width:4px;}
  .ac-train{border-color:var(--purple);} .ac-train .ac-icon{background:rgba(206,130,255,.15);} .ac-train .ac-badge{background:var(--purple);color:#2d1745;}
  .ac-verb{border-color:var(--blue);} .ac-verb .ac-icon{background:rgba(28,176,246,.15);} .ac-verb .ac-badge{background:var(--blue);color:#04344d;}
  .section-label{font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-muted);margin:0 4px 12px;}
  .unit-section{margin-bottom:24px;}
  .unit-label{display:flex;align-items:center;gap:8px;color:white;border-radius:12px;padding:11px 16px;margin-bottom:14px;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;letter-spacing:.4px;text-transform:uppercase;}
  .unit-label.green{background:var(--green-dark);} .unit-label.blue{background:var(--blue-dark);} .unit-label.purple{background:#9d4edd;} .unit-label.orange{background:#d97500;}
  .lesson-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  @media(min-width:520px){.lesson-grid{grid-template-columns:1fr 1fr 1fr;}}
  .lesson-btn{background:var(--card);border:2px solid var(--border);border-bottom-width:4px;border-radius:var(--radius);padding:13px 12px;cursor:pointer;font-family:'Nunito',sans-serif;color:var(--text);transition:all .12s;text-align:center;position:relative;}
  .lesson-btn:active{transform:translateY(2px);border-bottom-width:2px;}
  .lesson-btn .les-num{font-size:20px;font-weight:900;display:block;}
  .lesson-btn .les-topic{font-size:11px;font-weight:700;color:var(--text-muted);margin-top:2px;line-height:1.2;}
  .lesson-btn .les-mastery{margin-top:7px;height:5px;border-radius:99px;background:var(--border);overflow:hidden;}
  .lesson-btn .les-mastery>div{height:100%;background:var(--green);border-radius:99px;transition:width .4s;}
  .lesson-btn.mastered{border-color:var(--green);} .lesson-btn.mastered .les-num{color:var(--green);}
  .lesson-btn .les-check{position:absolute;top:-7px;right:-7px;font-size:14px;background:var(--green);border-radius:50%;width:22px;height:22px;display:none;align-items:center;justify-content:center;color:#04340a;}
  .lesson-btn.mastered .les-check{display:flex;}
  .ex-label{font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--blue);margin-bottom:8px;}
  .ex-type-badge{display:inline-block;background:var(--blue);color:#04344d;font-size:11px;font-weight:800;padding:4px 11px;border-radius:99px;margin-bottom:16px;font-family:'Nunito',sans-serif;letter-spacing:.5px;text-transform:uppercase;}
  .ex-type-badge.review{background:var(--orange);color:#2b1900;} .ex-type-badge.verb{background:var(--blue);color:#04344d;}
  .ex-title{font-family:'Nunito',sans-serif;font-weight:800;font-size:22px;line-height:1.35;margin-bottom:22px;}
  .options{display:flex;flex-direction:column;gap:10px;}
  .option-btn{background:var(--card);border:2px solid var(--border);border-bottom-width:4px;border-radius:var(--radius);padding:15px 18px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:17px;font-weight:600;color:var(--text);text-align:left;transition:all .1s;display:flex;align-items:center;gap:13px;width:100%;}
  .option-btn:active:not(:disabled){transform:translateY(2px);border-bottom-width:2px;}
  .option-btn.selected{border-color:var(--blue);background:rgba(28,176,246,.12);color:var(--blue);}
  .option-btn.correct{border-color:var(--green)!important;background:rgba(88,204,2,.15)!important;color:var(--green)!important;}
  .option-btn.wrong{border-color:var(--red)!important;background:rgba(255,75,75,.12)!important;color:var(--red)!important;}
  .option-btn:disabled{cursor:default;}
  .opt-letter{width:28px;height:28px;border-radius:8px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;flex-shrink:0;color:var(--text-muted);}
  .word-bank-sentence{background:var(--card);border:2px solid var(--border);border-radius:var(--radius);min-height:64px;padding:14px 16px;margin-bottom:18px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-family:'Nunito',sans-serif;}
  .word-placed{background:var(--blue);color:#04344d;border-radius:10px;padding:6px 13px;font-size:16px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;border:2px solid var(--blue-dark);}
  .word-placed:active{opacity:.8;}
  .word-bank{display:flex;flex-wrap:wrap;gap:8px;}
  .word-chip{background:var(--card);border:2px solid var(--border);border-bottom-width:4px;border-radius:12px;padding:9px 16px;font-family:'Nunito',sans-serif;font-weight:700;font-size:16px;cursor:pointer;transition:all .1s;color:var(--text);}
  .word-chip:active:not(.used){transform:translateY(2px);border-bottom-width:2px;}
  .word-chip.used{opacity:.25;pointer-events:none;}
  .fill-sentence{font-family:'Nunito',sans-serif;font-size:21px;font-weight:700;line-height:1.7;margin-bottom:8px;}
  .blank-input{border:none;border-bottom:3px solid var(--blue);background:var(--card);font-family:'Nunito',sans-serif;font-size:20px;font-weight:800;color:var(--blue);width:160px;text-align:center;outline:none;padding:4px 8px;margin:0 4px;border-radius:8px 8px 0 0;}
  .blank-input.correct{border-color:var(--green);color:var(--green);}
  .blank-input.wrong{border-color:var(--red);color:var(--red);}
  .fill-hint{font-size:13px;color:var(--text-muted);margin-top:10px;font-style:italic;}
  .match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .match-col{display:flex;flex-direction:column;gap:10px;}
  .match-chip{background:var(--card);border:2px solid var(--border);border-bottom-width:4px;border-radius:12px;padding:14px 12px;text-align:center;font-family:'Nunito',sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:all .1s;color:var(--text);min-height:52px;display:flex;align-items:center;justify-content:center;}
  .match-chip:active:not(.matched-correct){transform:translateY(2px);border-bottom-width:2px;}
  .match-chip.selected{border-color:var(--blue);background:rgba(28,176,246,.12);color:var(--blue);}
  .match-chip.matched-correct{border-color:var(--green)!important;background:rgba(88,204,2,.12)!important;color:var(--green)!important;opacity:.5;pointer-events:none;}
  .match-chip.matched-wrong{border-color:var(--red)!important;background:rgba(255,75,75,.12)!important;animation:shake .3s;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .grammar-tip{background:var(--yellow-light);border-radius:var(--radius);padding:16px 18px;margin-bottom:20px;color:#3a2e00;}
  .grammar-tip strong{font-family:'Nunito',sans-serif;font-weight:900;font-size:15px;display:block;margin-bottom:8px;}
  .grammar-tip table{width:100%;border-collapse:collapse;}
  .grammar-tip td,.grammar-tip th{padding:6px 9px;font-size:13px;border:1px solid rgba(0,0,0,.12);text-align:left;color:#3a2e00;}
  .grammar-tip th{background:rgba(0,0,0,.06);font-weight:800;}
  .grammar-tip td:first-child{font-weight:700;color:#3a2e00;}
  .feedback{position:fixed;bottom:0;left:0;right:0;padding:0;display:none;z-index:100;}
  .feedback.active{display:block;}
  .feedback-inner{max-width:720px;margin:0 auto;padding:18px;border-radius:20px 20px 0 0;}
  .feedback-inner.correct{background:#16312b;border-top:2px solid var(--green);}
  .feedback-inner.wrong{background:#3a1f24;border-top:2px solid var(--red);}
  .feedback-head{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
  .feedback-icon{font-size:26px;}
  .feedback-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:18px;}
  .feedback-inner.correct .feedback-title{color:var(--green);} .feedback-inner.wrong .feedback-title{color:var(--red);}
  .feedback-answer{font-family:'Nunito',sans-serif;font-weight:700;font-size:15px;margin-bottom:6px;}
  .feedback-note{font-size:14px;color:var(--text-muted);line-height:1.5;margin-bottom:14px;}
  .continue-btn,.check-btn,.btn-primary{display:block;width:100%;max-width:720px;margin:0 auto;background:var(--green);border:none;border-bottom:4px solid var(--green-dark);border-radius:14px;padding:16px;font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;color:#fff;cursor:pointer;transition:all .1s;letter-spacing:.5px;}
  .continue-btn:active,.check-btn:active,.btn-primary:active{transform:translateY(2px);border-bottom-width:2px;}
  .continue-btn.wrong-btn{background:var(--red);border-bottom-color:#CC3B3B;}
  .check-area{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);padding:14px 18px;display:none;z-index:50;}
  .check-area.visible{display:block;}
  .check-btn:disabled{background:var(--border);border-bottom-color:#2a363c;color:var(--text-muted);cursor:default;}
  .check-btn.flip{background:var(--blue);border-bottom-color:var(--blue-dark);color:#04344d;}
  .skip-btn{background:none;border:none;color:var(--text-muted);font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;cursor:pointer;display:block;margin:10px auto 0;text-decoration:underline;}
  .results{text-align:center;padding:30px 16px;}
  .result-icon{font-size:64px;margin-bottom:14px;animation:bounceIn .5s;}
  @keyframes bounceIn{0%{transform:scale(0)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
  .results h2{font-family:'Nunito',sans-serif;font-weight:900;font-size:28px;margin-bottom:8px;}
  .results p{color:var(--text-muted);font-size:15px;margin-bottom:26px;line-height:1.5;}
  .stats-row{display:flex;gap:12px;justify-content:center;margin-bottom:26px;flex-wrap:wrap;}
  .stat-card{background:var(--card);border:2px solid var(--border);border-radius:var(--radius);padding:14px 22px;min-width:100px;}
  .stat-card .num{font-family:'Nunito',sans-serif;font-weight:900;font-size:26px;}
  .stat-card .num.green{color:var(--green);} .stat-card .num.red{color:var(--red);} .stat-card .num.orange{color:var(--orange);}
  .stat-card .label{font-size:12px;color:var(--text-muted);font-weight:600;margin-top:2px;}
  .btn-row{display:flex;flex-direction:column;gap:10px;max-width:360px;margin:0 auto;}
  .btn-secondary{background:var(--card);border:2px solid var(--border);border-bottom-width:4px;border-radius:14px;padding:14px;font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;color:var(--text);cursor:pointer;transition:all .1s;}
  .btn-secondary:active{transform:translateY(2px);border-bottom-width:2px;}
  .review-list{text-align:left;max-width:480px;margin:0 auto 26px;}
  .review-item{background:var(--card);border:1px solid var(--border);border-left:4px solid var(--red);border-radius:12px;padding:12px 14px;margin-bottom:8px;}
  .review-item .ri-q{font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;margin-bottom:4px;}
  .review-item .ri-a{font-size:13px;color:var(--green);font-weight:700;}
  /* selector (config) screen */
  .config-intro{color:var(--text-muted);font-size:14px;line-height:1.5;margin-bottom:18px;}
  .chip-grid{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:18px;}
  .sel-chip{background:var(--card);border:2px solid var(--border);border-bottom-width:4px;border-radius:12px;padding:11px 14px;font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;color:var(--text);cursor:pointer;transition:all .1s;}
  .sel-chip:active{transform:translateY(2px);border-bottom-width:2px;}
  .sel-chip.on{border-color:var(--purple);background:rgba(206,130,255,.16);color:#e9c6ff;}
  .sel-chip.on.verbtense{border-color:var(--blue);background:rgba(28,176,246,.16);color:#bfe9ff;}
  .config-row{display:flex;gap:10px;margin-bottom:14px;}
  .config-row .btn-secondary{flex:1;padding:11px;font-size:13px;}
  .tense-chip{width:100%;text-align:left;display:flex;flex-direction:column;gap:2px;}
  .tense-chip .tc-sub{font-size:12px;font-weight:600;color:var(--text-muted);}
  .tense-chip.on .tc-sub{color:inherit;opacity:.8;}
  .verb-card{background:var(--card);border:2px solid var(--border);border-radius:20px;padding:30px 20px;text-align:center;margin-bottom:18px;}
  .verb-card .vc-inf{font-family:'Nunito',sans-serif;font-weight:900;font-size:30px;margin-bottom:4px;}
  .verb-card .vc-en{font-size:15px;color:var(--text-muted);margin-bottom:8px;}
  .verb-card .vc-tag{display:inline-block;font-size:11px;font-weight:800;padding:3px 10px;border-radius:99px;font-family:'Nunito',sans-serif;text-transform:uppercase;letter-spacing:.5px;}
  .verb-card .vc-tag.irr{background:rgba(255,150,0,.2);color:var(--orange);}
  .verb-card .vc-tag.reg{background:rgba(88,204,2,.2);color:var(--green);}
  @media(max-width:400px){.ex-title{font-size:20px}.match-chip{font-size:13px;padding:12px 8px}}
  .streak-banner{border-radius:var(--radius);padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:14px;background:var(--card);border:2px solid var(--border);}
  .streak-banner.active{border-color:#FF9600;background:rgba(255,150,0,.1);}
  .streak-banner.frozen{border-color:#1CB0F6;background:rgba(28,176,246,.1);}
  .streak-banner.none{border-color:var(--border);background:var(--card);}
  .streak-fire{font-size:36px;line-height:1;}
  .streak-body{flex:1;}
  .streak-count{font-family:'Nunito',sans-serif;font-weight:900;font-size:24px;line-height:1.1;}
  .streak-count.active{color:#FF9600;}
  .streak-count.frozen{color:#1CB0F6;}
  .streak-count.none{color:var(--text-muted);}
  .streak-label{font-size:13px;color:var(--text-muted);margin-top:2px;line-height:1.4;}
  .streak-done{font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;padding:5px 12px;border-radius:99px;background:rgba(88,204,2,.2);color:var(--green);border:1px solid var(--green);}
</style>
</head>
<body>
<div class="header" id="mainHeader">
  <button class="close-btn" onclick="goHome()">&times;</button>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
  <div class="header-stat" id="headerStat"></div>
</div>
<div class="main">
  <div class="screen active" id="homeScreen">
    <div class="home-hero"><div class="flag">&#127475;&#127473;</div><h1>Nederlands Oefenen</h1><p>Delftse Methode &bull; Lessen 1&ndash;26<br>Herhaling is de sleutel</p></div>
    <div id="streakBanner"></div>
    <div class="action-cards">
      <button class="action-card ac-review" id="reviewCard" onclick="startReview()"><div class="ac-icon">&#128260;</div><div class="ac-body"><div class="ac-title">Foutenrevisie</div><div class="ac-sub" id="reviewSub">Oefen de woorden die je fout had</div></div><div class="ac-badge" id="reviewBadge">0</div></button>
      <button class="action-card ac-verb" onclick="openVerbConfig()"><div class="ac-icon">&#9889;</div><div class="ac-body"><div class="ac-title">Werkwoorden trainen</div><div class="ac-sub">Betekenis &amp; tijden &bull; kies welke tijden</div></div><div class="ac-badge">&#9889;</div></button>
      <button class="action-card ac-train" onclick="openTrainConfig()"><div class="ac-icon">&#9851;</div><div class="ac-body"><div class="ac-title">Oneindig trainen</div><div class="ac-sub">Kies welke lessen je mengt &bull; blijft herhalen</div></div><div class="ac-badge">&#8734;</div></button>
    </div>
    <div class="section-label">Kies een les</div>
    <div id="unitsContainer"></div>
  </div>

  <div class="screen" id="configScreen">
    <div class="ex-label" id="configLabel"></div>
    <div class="ex-title" id="configTitle"></div>
    <div class="config-intro" id="configIntro"></div>
    <div class="config-row">
      <button class="btn-secondary" onclick="configSelectAll()">Alles selecteren</button>
      <button class="btn-secondary" onclick="configSelectNone()">Alles wissen</button>
    </div>
    <div class="chip-grid" id="configChips"></div>
  </div>

  <div class="screen" id="exerciseScreen">
    <div class="ex-label" id="exLabel"></div>
    <div id="exTypeBadge" class="ex-type-badge"></div>
    <div class="ex-title" id="exTitle"></div>
    <div id="exContent"></div>
  </div>

  <div class="screen" id="resultsScreen">
    <div class="results">
      <div class="result-icon" id="resultIcon">&#127881;</div>
      <h2 id="resultTitle"></h2>
      <p id="resultSubtitle"></p>
      <div class="stats-row">
        <div class="stat-card"><div class="num green" id="statCorrect">0</div><div class="label">Goed</div></div>
        <div class="stat-card"><div class="num red" id="statWrong">0</div><div class="label">Fout</div></div>
        <div class="stat-card"><div class="num orange" id="statReview">0</div><div class="label">Te herhalen</div></div>
      </div>
      <div id="reviewListContainer"></div>
      <div class="btn-row">
        <button class="btn-primary" id="resultPrimary" onclick="resultPrimaryAction()"></button>
        <button class="btn-secondary" onclick="goHome()">&#127968; Terug naar home</button>
      </div>
    </div>
  </div>
</div>

<div class="feedback" id="feedbackPanel">
  <div class="feedback-inner" id="feedbackInner">
    <div class="feedback-head"><div class="feedback-icon" id="feedbackIcon"></div><div class="feedback-title" id="feedbackTitle"></div></div>
    <div class="feedback-answer" id="feedbackAnswer"></div>
    <div class="feedback-note" id="feedbackNote"></div>
    <button class="continue-btn" id="continueBtn" onclick="nextQuestion()">VERDER</button>
  </div>
</div>

<div class="check-area" id="checkArea">
  <button class="check-btn" id="checkBtn" disabled onclick="primaryButtonAction()">CONTROLEER</button>
  <button class="skip-btn" id="skipBtn" onclick="skipQuestion()" style="display:none">Ik weet het niet — toon antwoord</button>
</div>

<script>
const LESSONS = {

  1: { // Hoe heet je? — Intro, verbs zijn/heten/komen/wonen, numbers

// ── Streak helpers ──
function todayStr() {
  // Returns local date as 'YYYY-MM-DD'
  const d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}
function daysBetween(a, b) {
  // a, b are 'YYYY-MM-DD' strings
  const da = new Date(a), db = new Date(b);
  return Math.round((db - da) / 86400000);
}
function checkAndUpdateStreak() {
  // Called when a full lesson is completed
  const today = todayStr();
  const last = STORE.streakLastDay;
  if (!last) {
    // First ever completion
    STORE.streak = 1;
    STORE.streakLastDay = today;
    STORE.streakFrozen = false;
  } else if (last === today) {
    // Already completed today — no change, just unfreeze if frozen
    STORE.streakFrozen = false;
  } else {
    const diff = daysBetween(last, today);
    if (diff === 1) {
      // Yesterday → perfect streak
      STORE.streak += 1;
      STORE.streakLastDay = today;
      STORE.streakFrozen = false;
    } else if (diff === 2 && STORE.streakFrozen) {
      // Missed exactly 1 day but grace was active → extend streak
      STORE.streak += 1;
      STORE.streakLastDay = today;
      STORE.streakFrozen = false;
    } else if (diff >= 2) {
      // Missed too many days → reset
      STORE.streak = 1;
      STORE.streakLastDay = today;
      STORE.streakFrozen = false;
    }
  }
  saveStore();
}
function getStreakStatus() {
  // Returns: {streak, status: 'active'|'frozen'|'broken'|'none', doneToday}
  const today = todayStr();
  const last = STORE.streakLastDay;
  if (!last || STORE.streak === 0) return { streak: 0, status: 'none', doneToday: false };
  const diff = daysBetween(last, today);
  const doneToday = diff === 0;
  if (doneToday) return { streak: STORE.streak, status: 'active', doneToday: true };
  if (diff === 1) return { streak: STORE.streak, status: 'active', doneToday: false };
  if (diff === 2 && STORE.streakFrozen) return { streak: STORE.streak, status: 'frozen', doneToday: false };
  return { streak: STORE.streak, status: 'broken', doneToday: false };
}
function activateGrace() {
  // Called at app open: if missed yesterday, set grace
  const s = getStreakStatus();
  if (s.status === 'active' && !s.doneToday && s.streak > 0) {
    if (!STORE.streakFrozen) {
      STORE.streakFrozen = true;
      saveStore();
    }
  }
}

function itemKey(ex, lessonNum){
  const base = ex.question || (ex.sentence?ex.sentence.join('_'):'') || (ex.pairs?ex.pairs.map(p=>p.nl).join(','):'');
  return lessonNum+'::'+ex.type+'::'+base.slice(0,60);
}

// ═══════════════════ SESSION BUILDERS ═══════════════════
function startLesson(num){
  mode='lesson'; currentLessonNum=num;
  const lesson=LESSONS[num]; if(!lesson) return;
  // Interleave exercise types so same type never appears 3+ times in a row
  const raw = shuffle(lesson.exercises.map(ex=>({ex,lessonNum:num})));
  queue = interleaveTypes(raw);
  beginSession();
}
function interleaveTypes(items) {
  // Separate by type
  const buckets = {};
  items.forEach(item => {
    const t = item.ex.type;
    if(!buckets[t]) buckets[t] = [];
    buckets[t].push(item);
  });
  // Round-robin across types
  const result = [];
  const types = Object.keys(buckets);
  let added = true;
  while(added) {
    added = false;
    // Shuffle type order each round for variety
    shuffle(types).forEach(t => {
      if(buckets[t].length > 0) {
        result.push(buckets[t].shift());
        added = true;
      }
    });
  }
  return result;
}
function startReview(){
  if(STORE.reviewQueue.length===0) return;
  mode='review'; currentLessonNum=null;
  const due=[...STORE.reviewQueue].sort((a,b)=>a.dueIn-b.dueIn).slice(0,15);
  queue=due.map(d=>({ex:d.ex,lessonNum:d.lessonNum,_reviewRef:d}));
  beginSession();
}
function startTrain(){
  mode='train'; currentLessonNum=null;
  const sel=STORE.trainLessons;
  let all=[];
  for(const num of sel){ if(LESSONS[num]) LESSONS[num].exercises.forEach(ex=>all.push({ex,lessonNum:num})); }
  all.sort((a,b)=>{const ka=itemKey(a.ex,a.lessonNum),kb=itemKey(b.ex,b.lessonNum);return (STORE.correctStreak[ka]||0)-(STORE.correctStreak[kb]||0);});
  queue=all; beginSession();
}
function startVerb(){
  mode='verb'; currentLessonNum=null;
  // Build a weighted, repeating queue of verb questions across selected tenses.
  const tenses=STORE.verbTenses;
  let items=[];
  // Weight by freq (importance) — higher freq appears more times
  VERBS.forEach(v=>{
    const reps=Math.max(1, v.freq-2); // freq 5 -> 3 copies, freq 3 -> 1
    for(let r=0;r<reps;r++){
      tenses.forEach(t=>{
        const q=buildVerbQuestion(v,t);
        if(q) items.push({ex:q, lessonNum:'V', _verb:v.inf});
      });
    }
  });
  // prioritise low streak
  items.sort((a,b)=>{const ka=a.ex._vkey,kb=b.ex._vkey;return (STORE.correctStreak[ka]||0)-(STORE.correctStreak[kb]||0);});
  queue=items; beginSession();
}

function beginSession(){currentIndex=0;sessionCorrect=0;sessionWrong=0;wrongThisSession=[];showScreen('exerciseScreen');renderQuestion();window.scrollTo(0,0);}

// ═══════════════════ VERB QUESTION GENERATOR ═══════════════════
function buildVerbQuestion(v, tense){
  const vkey = 'V::'+v.inf+'::'+tense;
  if(tense==='meaning'){
    // direction varies: NL->EN multiple choice
    const distractors = shuffle(VERBS.filter(x=>x.inf!==v.inf)).slice(0,3).map(x=>x.en);
    const opts = shuffle([v.en, ...distractors]);
    return { type:'multiple_choice', _vkey:vkey,
      question:`Wat betekent het werkwoord '${v.inf}'?`,
      options:opts, correct:opts.indexOf(v.en),
      explanation:`'${v.inf}' = ${v.en}.` + (v.irregular?' (onregelmatig werkwoord)':'') };
  }
  if(tense==='tt'){
    const ans = v.tt.hij;
    if(ans==='-') return null;
    // Multiple choice for present tense — avoids infinitive giveaway, forces recognition
    const wrongForms = [v.inf, v.tt.ik !== ans ? v.tt.ik : v.ovt.sing, v.perf.pp||v.ovt.sing];
    const distractors = [...new Set(wrongForms.filter(x=>x&&x!==ans&&x!=='-'))].slice(0,3);
    // pad with generic wrong forms if needed
    while(distractors.length < 3) distractors.push(['loopt','woont','heeft','gaat','werkt'].find(x=>x!==ans&&!distractors.includes(x))||'is');
    const opts = shuffle([ans, ...distractors.slice(0,3)]);
    return { type:'multiple_choice', _vkey:vkey,
      question:`Tegenwoordige tijd: 'hij/zij ___' — werkwoord: ${v.inf} (${v.en})`,
      options: opts, correct: opts.indexOf(ans),
      explanation:`hij/zij ${ans} — '${v.inf}' = ${v.en}. Ik: ${v.tt.ik} | jij: ${v.tt.jij} | wij: ${v.tt.wij}.` };
  }
  if(tense==='perf'){
    if(!v.perf.pp) return null;
    // multiple choice on participle + show aux
    const distractors = shuffle(VERBS.filter(x=>x.perf.pp&&x.perf.pp!==v.perf.pp)).slice(0,3).map(x=>x.perf.pp);
    const opts = shuffle([v.perf.pp, ...distractors]);
    return { type:'multiple_choice', _vkey:vkey,
      question:`Voltooid deelwoord van '${v.inf}' (${v.en})?`,
      options:opts, correct:opts.indexOf(v.perf.pp),
      explanation:`${v.perf.aux} + ${v.perf.pp}. Bijv: 'Ik ${v.perf.aux==='zijn'?'ben':'heb'} ${v.perf.pp}.'` };
  }
  if(tense==='ovt'){
    const ans=v.ovt.sing;
    // MC: show 4 options — correct + 3 plausible wrong forms
    const wrongs = [v.ovt.plur, v.perf.pp||v.inf+'d', v.tt.hij].filter(x=>x&&x!==ans&&x!=='-');
    const distractors = [...new Set(wrongs)].slice(0,3);
    while(distractors.length < 3) distractors.push(['werkte','ging','was','deed','zag'].find(x=>x!==ans&&!distractors.includes(x))||'had');
    const opts = shuffle([ans, ...distractors.slice(0,3)]);
    return { type:'multiple_choice', _vkey:vkey,
      question:`Verleden tijd (enkelvoud) van '${v.inf}' (${v.en}) — ik ___`,
      options: opts, correct: opts.indexOf(ans),
      explanation:`ik ${ans} (enkelvoud) / wij ${v.ovt.plur} (meervoud). '${v.inf}' = ${v.en}.`+(v.irregular?' ⚠ Onregelmatig!':'') };
  }
  if(tense==='futur'){
    // recognise future construction
    const correct=`Ik ga ${v.inf}`;
    const opts=shuffle([correct, `Ik ben ${v.inf}`, `Ik heb ${v.inf}`, `Ik word ${v.inf}`]);
    return { type:'multiple_choice', _vkey:vkey,
      question:`Hoe vorm je de toekomende tijd van '${v.inf}' (${v.en})?`,
      options:opts, correct:opts.indexOf(correct),
      explanation:`Toekomst: 'gaan' of 'zullen' + infinitief. 'Ik ga ${v.inf}' of 'Ik zal ${v.inf}'.` };
  }
  return null;
}

  badge.textContent=badges[ex.type]||ex.type;

    const rows=tip.table.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('');

    grammarHTML=`<div class="grammar-tip"><strong>${tip.title}</strong><table>${heads}${rows}</table></div>`;

function renderContent(ex){
  switch(ex.type){case 'multiple_choice':return renderMC(ex);case 'fill_blank':return renderFill(ex);case 'word_order':return renderWO(ex);case 'match_pairs':return renderMatch(ex);default:return'';}
}
function renderMC(ex){const L=['A','B','C','D','E'];return `<div class="options">${ex.options.map((o,i)=>`<button class="option-btn" data-idx="${i}" onclick="selectOption(${i})"><span class="opt-letter">${L[i]}</span>${o}</button>`).join('')}</div>`;}
function renderFill(ex){return `<div class="fill-sentence">${ex.sentence[0]}<input class="blank-input" id="blankInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" oninput="onFill(this.value)" onkeydown="if(event.key==='Enter'&&!isAnswered&&fillAnswer)checkAnswer()"/>${ex.sentence[1]||''}</div>${ex.hint?`<div class="fill-hint">&#128161; ${ex.hint}</div>`:''}`;}
function renderWO(ex){const chips=shuffle(ex.words.map((w,i)=>({w,i})));return `<div class="word-bank-sentence" id="wbSentence"><span style="color:var(--text-muted);font-size:15px">Tik op de woorden hieronder</span></div><div class="word-bank" id="wordBank">${chips.map(c=>`<button class="word-chip" data-idx="${c.i}" onclick="placeWord('${esc(c.w)}',${c.i})">${c.w}</button>`).join('')}</div>`;}
function renderMatch(ex){const left=ex.pairs.map((p,i)=>({id:'L'+i,text:p.nl,pi:i}));const right=shuffle(ex.pairs.map((p,i)=>({id:'R'+i,text:p.en,pi:i})));return `<div class="match-grid"><div class="match-col">${left.map(it=>`<div class="match-chip" data-id="${it.id}" onclick="matchClick('${it.id}',${it.pi})">${it.text}</div>`).join('')}</div><div class="match-col">${right.map(it=>`<div class="match-chip" data-id="${it.id}" onclick="matchClick('${it.id}',${it.pi})">${it.text}</div>`).join('')}</div></div>`;}

function selectOption(i){if(isAnswered)return;selectedOption=i;document.querySelectorAll('.option-btn').forEach((b,idx)=>b.classList.toggle('selected',idx===i));enableCheck();}
function onFill(v){fillAnswer=v.trim();document.getElementById('checkBtn').disabled=fillAnswer.length===0;}
function placeWord(w,idx){if(isAnswered)return;wbWords.push({w,idx});document.querySelector(`.word-chip[data-idx="${idx}"]`).classList.add('used');drawSentence();enableCheck();}
function removeWord(pi){if(isAnswered)return;const r=wbWords.splice(pi,1)[0];document.querySelector(`.word-chip[data-idx="${r.idx}"]`).classList.remove('used');drawSentence();if(wbWords.length===0)document.getElementById('checkBtn').disabled=true;}
function drawSentence(){const s=document.getElementById('wbSentence');if(!s)return;s.innerHTML=wbWords.length===0?'<span style="color:var(--text-muted);font-size:15px">Tik op de woorden hieronder</span>':wbWords.map((w,i)=>`<span class="word-placed" onclick="removeWord(${i})">${w.w}</span>`).join('');}
function enableCheck(){const b=document.getElementById('checkBtn');b.disabled=false;b.textContent='CONTROLEER';}

function matchClick(id,pi){
  if(isAnswered)return;
  const el=document.querySelector(`[data-id="${id}"]`);
  if(!el||el.classList.contains('matched-correct'))return;
  const isL=id.startsWith('L');
  if(isL){if(matchSideL)document.querySelector(`[data-id="${matchSideL}"]`)?.classList.remove('selected');matchSideL=id;matchSideLPair=pi;}
  else{if(matchSideR)document.querySelector(`[data-id="${matchSideR}"]`)?.classList.remove('selected');matchSideR=id;matchSideRPair=pi;}
  el.classList.add('selected');
  if(matchSideL&&matchSideR){
    const lEl=document.querySelector(`[data-id="${matchSideL}"]`),rEl=document.querySelector(`[data-id="${matchSideR}"]`);
    if(matchSideLPair===matchSideRPair){lEl.classList.remove('selected');rEl.classList.remove('selected');lEl.classList.add('matched-correct');rEl.classList.add('matched-correct');matchedPairs++;}
    else{lEl.classList.add('matched-wrong');rEl.classList.add('matched-wrong');const a=matchSideL,b=matchSideR;setTimeout(()=>{document.querySelector(`[data-id="${a}"]`)?.classList.remove('matched-wrong','selected');document.querySelector(`[data-id="${b}"]`)?.classList.remove('matched-wrong','selected');},550);}
    matchSideL=matchSideR=matchSideLPair=matchSideRPair=null;
    if(matchedPairs===totalPairs){const b=document.getElementById('checkBtn');b.disabled=false;b.textContent='VERDER';b.className='check-btn flip';isAnswered=true;gradeSilently(true);}
  }
}

function primaryButtonAction(){if(isAnswered){nextQuestion();return;}checkAnswer();}
function skipQuestion(){if(isAnswered)return;const ex=currentEx.ex;isAnswered=true;const ct=answerText(ex);revealAnswer(ex,false);gradeSilently(false);showFeedback(false,ex.explanation,ct,true);}

function checkAnswer(){
  if(isAnswered)return;
  const ex=currentEx.ex;let correct=false,correctText='';
  if(ex.type==='multiple_choice'){
    correct=selectedOption===ex.correct;correctText=ex.options[ex.correct];
    document.querySelectorAll('.option-btn').forEach((b,i)=>{b.disabled=true;if(i===ex.correct)b.classList.add('correct');else if(i===selectedOption&&!correct)b.classList.add('wrong');});
  }else if(ex.type==='fill_blank'){
    const n=fillAnswer.toLowerCase().trim().replace(/[.,!?]$/,'');const c=ex.blank.toLowerCase().trim();
    correct=n===c;correctText=ex.blank;
    const inp=document.getElementById('blankInput');if(inp){inp.disabled=true;inp.classList.add(correct?'correct':'wrong');}
  }else if(ex.type==='word_order'){
    const placed=wbWords.map(w=>w.w).join(' ');correct=placed.toLowerCase()===ex.correct.toLowerCase();correctText=ex.correct;
  }
  isAnswered=true;grade(correct);showFeedback(correct,ex.explanation,correctText,!correct);
}

function answerText(ex){if(ex.type==='multiple_choice')return ex.options[ex.correct];if(ex.type==='fill_blank')return ex.blank;if(ex.type==='word_order')return ex.correct;if(ex.type==='match_pairs')return ex.pairs.map(p=>`${p.nl} = ${p.en}`).join(' • ');return'';}
function revealAnswer(ex){if(ex.type==='multiple_choice'){document.querySelectorAll('.option-btn').forEach((b,i)=>{b.disabled=true;if(i===ex.correct)b.classList.add('correct');});}else if(ex.type==='fill_blank'){const inp=document.getElementById('blankInput');if(inp){inp.disabled=true;inp.value=ex.blank;inp.classList.add('correct');}}}

function grade(correct){
  const ex=currentEx.ex,ln=currentEx.lessonNum;
  const key=ex._vkey||itemKey(ex,ln);
  STORE.seenCount[key]=(STORE.seenCount[key]||0)+1;
  if(correct){
    sessionCorrect++;STORE.correctStreak[key]=(STORE.correctStreak[key]||0)+1;
    if(currentEx._reviewRef){currentEx._reviewRef.streak=(currentEx._reviewRef.streak||0)+1;if(currentEx._reviewRef.streak>=2){STORE.reviewQueue=STORE.reviewQueue.filter(r=>r!==currentEx._reviewRef);}else{currentEx._reviewRef.dueIn=Date.now()+1;}}
  }else{
    sessionWrong++;STORE.correctStreak[key]=0;
    wrongThisSession.push({q:ex.question||(ex.sentence?ex.sentence.join(' ___ '):'')||'Koppelen',a:answerText(ex)});
    addToReview(ex,ln);
  }
  if(typeof ln==='number') updateMastery(ln);
  saveStore();
}
function gradeSilently(correct){grade(correct);}
function addToReview(ex,ln){
  const key=ex._vkey||itemKey(ex,ln);
  const existing=STORE.reviewQueue.find(r=>(r.ex._vkey||itemKey(r.ex,r.lessonNum))===key);
  if(existing){existing.streak=0;existing.dueIn=Date.now();return;}
  STORE.reviewQueue.push({ex,lessonNum:ln,dueIn:Date.now(),streak:0});
}
function updateMastery(ln){const lesson=LESSONS[ln];if(!lesson)return;let m=0;lesson.exercises.forEach(ex=>{if((STORE.correctStreak[itemKey(ex,ln)]||0)>=1)m++;});STORE.mastery[ln]=m/lesson.exercises.length;}

function showFeedback(correct,explanation,correctAnswer){
  hideCheckArea();
  const panel=document.getElementById('feedbackPanel'),inner=document.getElementById('feedbackInner');
  panel.classList.add('active');inner.className='feedback-inner '+(correct?'correct':'wrong');
  document.getElementById('feedbackIcon').innerHTML=correct?'&#9989;':'&#10060;';
  document.getElementById('feedbackTitle').textContent=correct?goodMsg():'Bijna! Let op:';
  document.getElementById('feedbackAnswer').innerHTML=(!correct&&correctAnswer)?('Antwoord: '+correctAnswer):'';
  document.getElementById('feedbackNote').textContent=explanation||'';
  const btn=document.getElementById('continueBtn');btn.className='continue-btn'+(correct?'':' wrong-btn');btn.textContent='VERDER';btn.focus();
}
function hideFeedback(){document.getElementById('feedbackPanel').classList.remove('active');}
function goodMsg(){const m=['Goed zo!','Uitstekend!','Correct!','Helemaal goed!','Knap gedaan!','Prima!'];return m[Math.floor(Math.random()*m.length)];}

function nextQuestion(){hideFeedback();currentIndex++;renderQuestion();window.scrollTo(0,0);}

function showResults(){
  hideCheckArea();hideFeedback();showScreen('resultsScreen');document.getElementById('progressBar').style.width='100%';
  // Streak: only a full lesson completion (mode==='lesson', all 10 exercises done) counts
  if(mode==='lesson' && sessionCorrect+sessionWrong >= 10) checkAndUpdateStreak();
  const total=sessionCorrect+sessionWrong,inReview=STORE.reviewQueue.length;
  document.getElementById('statCorrect').textContent=sessionCorrect;
  document.getElementById('statWrong').textContent=sessionWrong;
  document.getElementById('statReview').textContent=inReview;
  let icon,title,sub;const pct=total>0?Math.round(sessionCorrect/total*100):0;
  if(mode==='review'){icon='&#128260;';title='Revisie klaar!';sub=inReview>0?`Nog ${inReview} item(s). Items verdwijnen na 2x goed.`:'Geweldig — je foutenlijst is leeg!';}
  else if(pct>=90){icon='&#127942;';title='Fantastisch!';sub='Sterke beheersing.';}
  else if(pct>=70){icon='&#11088;';title='Goed gedaan!';sub='Je fouten staan klaar in de revisie.';}
  else if(pct>=50){icon='&#128170;';title='Goed begin!';sub='Herhaal je fouten — zo beklijft het.';}
  else{icon='&#128218;';title='Blijf oefenen!';sub='Herhaling is hoe het blijft hangen.';}
  document.getElementById('resultIcon').innerHTML=icon;
  document.getElementById('resultTitle').textContent=title;
  // Append streak info to subtitle if lesson was completed
  if(mode==='lesson' && sessionCorrect+sessionWrong >= 10){
    const s = getStreakStatus();
    const streakMsg = s.streak > 1
      ? ` &#128293; ${s.streak} dias seguidos!`
      : ' &#128293; Streak começa hoje!';
    sub += streakMsg;
  }
  document.getElementById('resultSubtitle').innerHTML=sub;
  const cont=document.getElementById('reviewListContainer');
  if(wrongThisSession.length>0){cont.innerHTML='<div class="section-label" style="text-align:left;max-width:480px;margin:0 auto 10px">Wat je fout had</div><div class="review-list">'+wrongThisSession.slice(0,8).map(w=>`<div class="review-item"><div class="ri-q">${w.q}</div><div class="ri-a">&#10003; ${w.a}</div></div>`).join('')+'</div>';}else{cont.innerHTML='';}
  const pb=document.getElementById('resultPrimary');
  if(STORE.reviewQueue.length>0){pb.innerHTML='&#128260; Oefen je fouten ('+STORE.reviewQueue.length+')';pb._action='review';}
  else{pb.innerHTML='&#127968; Terug naar home';pb._action='home';}
}
function resultPrimaryAction(){const a=document.getElementById('resultPrimary')._action;if(a==='review')startReview();else goHome();}

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function esc(s){return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;');}
function showCheckArea(){document.getElementById('checkArea').classList.add('visible');}
function hideCheckArea(){document.getElementById('checkArea').classList.remove('visible');}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('feedbackPanel').classList.contains('active')){e.preventDefault();nextQuestion();}});
renderHome();
</script>
</body>
</html>
